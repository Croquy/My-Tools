<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agenda Mensuel</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Handlee&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ─── Variables (écrasées par JS selon le mois) ─── */
:root {
  --accent: #9B7FCC;
  --pastel: #EDE5FF;
  --text:   #444;
  --border: 1.5px solid var(--accent);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  color: var(--text);
  background: #f3f3f3;
  padding: 20px;
}

/* ─── Contrôles ─── */
.controls {
  width: 297mm;
  margin: 0 auto 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.controls button {
  border: none;
  border-radius: 12px;
  padding: 10px 20px;
  background: var(--accent);
  color: white;
  cursor: pointer;
  font-weight: 600;
  font-family: inherit;
  font-size: 14px;
}

.controls .info {
  font-size: 13px;
  color: #888;
}

/* ════════════════════════════════
   PAGE A4 PAYSAGE = 2 × A5 portrait
════════════════════════════════ */
.page {
  width: 297mm;
  height: 210mm;
  background: white;
  margin: 0 auto;
  display: flex;
  overflow: hidden;
}

/* ─── Chaque moitié = A5 portrait ─── */
.half {
  width: 148.5mm;
  height: 210mm;
  padding: 8mm 9mm;
  display: flex;
  flex-direction: column;
}

/* Séparateur central (pointillé, visible plié) */
.half-left {
  border-right: 1px dashed rgba(0,0,0,0.12);
}


/* ════════════════════════════════
   MOITIÉ GAUCHE — CALENDRIER
════════════════════════════════ */

/* ─── En-tête mois ─── */
.month-title {
  font-family: 'Handlee', cursive;
  font-size: 22px;
  color: var(--accent);
  text-align: center;
  letter-spacing: 1px;
  margin-bottom: 5mm;
  flex-shrink: 0;
}

/* ─── Grille calendrier ─── */
.cal-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 22px repeat(7, 1fr);
  grid-auto-rows: auto;
  gap: 2px;
  overflow: hidden;
}

.cal-col-header {
  font-family: 'Handlee', cursive;
  font-size: 9px;
  color: var(--accent);
  text-align: center;
  padding: 2px 0 4px;
}

.cal-week-num {
  font-size: 11px;
  font-weight: 700;
  font-family: 'Handlee', cursive;
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  padding-right: 2px;
  opacity: 0.85;
}

/* ─── Case d'un jour ─── */
.day-cell {
  border: 1px solid rgba(0,0,0,0.07);
  border-radius: 5px;
  padding: 2px 3px;
  background: white;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

.day-cell.empty   { background: transparent; border-color: transparent; }
.day-cell.weekend { background: var(--pastel); border-color: rgba(0,0,0,0.05); }

.day-cell.ferie {
  background: white;
  border: 2px solid var(--accent);
}
.day-cell.ferie .day-num  { color: var(--accent); }
.day-cell.ferie .ferie-lbl { color: var(--accent); }

.day-cell.vacance { border-color: var(--accent); }
.day-cell.vacance .day-num { font-style: italic; }

.day-num {
  font-family: 'Handlee', cursive;
  font-size: 14px;
  color: var(--accent);
  line-height: 1;
}

.ferie-lbl {
  font-size: 5.5px;
  color: var(--accent);
  margin-top: 1px;
  line-height: 1.2;
}




/* ════════════════════════════════
   MOITIÉ DROITE — NOTES
════════════════════════════════ */
.notes-header {
  font-family: 'Handlee', cursive;
  font-size: 22px;
  color: var(--accent);
  text-align: center;
  letter-spacing: 1px;
  margin-bottom: 4mm;
  flex-shrink: 0;
}

/* Zone principale : 2 colonnes + bloc notes en bas */
.notes-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow: hidden;
}

/* Ligne du haut : col gauche (films/livres/jeux) + col droite (médical/dépenses) */
.notes-cols {
  flex: 1;
  display: flex;
  gap: 6px;
  overflow: hidden;
}

.notes-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* ─── Bloc générique (bordure arrondie) ─── */
.bloc {
  border: var(--border);
  border-radius: 12px;
  padding: 5px 7px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.bloc-title {
  font-family: 'Handlee', cursive;
  font-size: 12px;
  color: var(--accent);
  text-align: center;
  margin-bottom: 3px;
  flex-shrink: 0;
}

/* Lignes réglées dans les blocs */
.bloc-lines {
  flex: 1;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 27px,
    rgba(0,0,0,0.07) 28px
  );
}

/* ─── Bloc Notes (style Pensées) ─── */
.bloc-notes {
  flex-shrink: 0;
  height: 28%;
  background: var(--pastel);
  border-radius: 14px;
  padding: 6px 8px;
}

.bloc-notes .bloc-title {
  font-size: 13px;
}

.bloc-notes .bloc-lines {
  background-image: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 29px,
    rgba(0,0,0,0.08) 30px
  );
}

/* Col gauche : 3 blocs égaux */
.col-left .bloc  { flex: 1; }

/* Col droite : 2 blocs égaux mais plus hauts */
.col-right .bloc { flex: 1; }


/* ─── Format B6 : scale uniforme ─── */
body.fmt-b6 .page {
  transform-origin: top left;
}

/* ─── Impression ─── */
@media print {
  body { background: white; padding: 0; }
  .controls { display: none; }
  .page { margin: 0; }

  /* A5 : centré sur A4 */
  body.fmt-a5 .page { margin: auto; }
  @page { size: A4 landscape; margin: 0; }
}
</style>
</head>

<body>

<div class="controls">
  <button onclick="window.print()">🖨️ Imprimer</button>
  <div style="display:flex;align-items:center;gap:8px;">
    <label style="font-size:13px;color:#888;">Format :</label>
    <select id="formatPicker" onchange="applyFormat()" style="padding:8px 12px;border-radius:10px;border:1px solid #ccc;font-family:inherit;font-size:13px;">
      <option value="A5">A5 — plier (pas de rognage)</option>
      <option value="B6">B6 — plier + rogner</option>
    </select>
  </div>
  <span class="info" id="controlInfo"></span>
</div>

<div class="page" id="mainPage">

  <!-- ══ MOITIÉ GAUCHE : CALENDRIER ══ -->
  <div class="half half-left">
    <div class="month-title" id="monthTitle"></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- ══ MOITIÉ DROITE : NOTES ══ -->
  <div class="half half-right">
    <div class="notes-header" id="notesHeader"></div>

    <div class="notes-body">

      <!-- Ligne du haut : 2 colonnes -->
      <div class="notes-cols">

        <!-- Col gauche : Films · Livres · Jeux -->
        <div class="notes-col col-left">
          <div class="bloc">
            <div class="bloc-title">🎬 Films</div>
            <div class="bloc-lines"></div>
          </div>
          <div class="bloc">
            <div class="bloc-title">📚 Livres</div>
            <div class="bloc-lines"></div>
          </div>
          <div class="bloc">
            <div class="bloc-title">🎮 Jeux</div>
            <div class="bloc-lines"></div>
          </div>
        </div>

        <!-- Col droite : Médical · Dépenses -->
        <div class="notes-col col-right">
          <div class="bloc">
            <div class="bloc-title">🏥 Médical</div>
          </div>
          <div class="bloc">
            <div class="bloc-title">💸 Dépenses</div>
          </div>
        </div>

      </div>

      <!-- Bas : grand bloc Notes -->
      <div class="bloc bloc-notes">
        <div class="bloc-title">Notes</div>
        <div class="bloc-lines"></div>
      </div>

    </div>
  </div>

</div>


<!-- Traits de coupe B6 — avant le script pour être trouvés par le JS -->
<svg id="cropSvg" style="position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;display:none;z-index:999;" xmlns="http://www.w3.org/2000/svg">
  <line id="cropBottom" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line id="cropRight"  stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
</svg>

<script>
/* ════════════════════════════════
   PALETTES PAR MOIS (0 = janvier)
════════════════════════════════ */
const THEMES = [
  { accent: "#7FB8E0", pastel: "#EBF5FF" }, // Janvier
  { accent: "#89A8D5", pastel: "#E6EEFF" }, // Février
  { accent: "#7DC4A0", pastel: "#EDFAF3" }, // Mars
  { accent: "#5FAF82", pastel: "#E6F7EE" }, // Avril
  { accent: "#A8D5BA", pastel: "#EEF9F1" }, // Mai
  { accent: "#E07FAF", pastel: "#FFF0F6" }, // Juin
  { accent: "#F4A7C3", pastel: "#FFF4F8" }, // Juillet
  { accent: "#D9A8D0", pastel: "#FCEEFF" }, // Août
  { accent: "#B8A1D9", pastel: "#F3ECFF" }, // Septembre
  { accent: "#9B7FCC", pastel: "#EDE5FF" }, // Octobre
  { accent: "#5B9BD5", pastel: "#E6F2FF" }, // Novembre
  { accent: "#89C4C4", pastel: "#E8F9F9" }, // Décembre
];

const MONTHS_FR = [
  "Janvier","Février","Mars","Avril","Mai","Juin",
  "Juillet","Août","Septembre","Octobre","Novembre","Décembre"
];

const DAYS_SHORT = ["L","M","M","J","V","S","D"];


/* ─── Lecture des paramètres URL ─── */
const params   = new URLSearchParams(window.location.search);
const moisParam = params.get("mois") || (() => {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`;
})();
const zone = params.get("zone") || "A";

const [yearStr, monthStr] = moisParam.split("-");
const year  = parseInt(yearStr);
const month = parseInt(monthStr) - 1; // 0-based

/* ─── Thème du mois ─── */
const theme = THEMES[month];
document.documentElement.style.setProperty("--accent", theme.accent);
document.documentElement.style.setProperty("--pastel", theme.pastel);
document.documentElement.style.setProperty("--border", `1.5px solid ${theme.accent}`);

/* ─── Titres ─── */
const label = `${MONTHS_FR[month]} ${year}`;
document.getElementById("monthTitle").textContent  = label;
document.getElementById("notesHeader").textContent = label;
document.getElementById("controlInfo").textContent =
  `Zone ${zone !== "none" ? zone : "—"} · ${label}`;


/* ════════════════════════════════
   UTILITAIRES DATES
════════════════════════════════ */
function getISOWeek(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay()+6)%7);
  const w1 = new Date(d.getFullYear(), 0, 4);
  return 1 + Math.round(((d-w1)/86400000 - 3 + (w1.getDay()+6)%7)/7);
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}


/* ════════════════════════════════
   JOURS FÉRIÉS
════════════════════════════════ */
function easterSunday(y) {
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4;
  const f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3);
  const h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4;
  const l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
  return new Date(y, Math.floor((h+l-7*m+114)/31)-1, ((h+l-7*m+114)%31)+1);
}

function getHolidays(y) {
  const e   = easterSunday(y);
  const add = (dt,n) => { const d=new Date(dt); d.setDate(d.getDate()+n); return d; };
  const k   = d => dateKey(d);
  const map = new Map();
  map.set(`${y}-01-01`, "Jour de l'An");
  map.set(k(add(e,1)),  "Lundi de Pâques");
  map.set(`${y}-05-01`, "Fête du Travail");
  map.set(`${y}-05-08`, "Victoire 1945");
  map.set(k(add(e,39)), "Ascension");
  map.set(k(add(e,50)), "Lundi de Pentecôte");
  map.set(`${y}-07-14`, "Fête nationale");
  map.set(`${y}-08-15`, "Assomption");
  map.set(`${y}-11-01`, "Toussaint");
  map.set(`${y}-11-11`, "Armistice");
  map.set(`${y}-12-25`, "Noël");
  return map;
}

const holidayMap = new Map([...getHolidays(year), ...getHolidays(year+1)]);


/* ════════════════════════════════
   VACANCES SCOLAIRES — API
════════════════════════════════ */
async function fetchVacances(z) {
  if (z === "none") return [];
  // Fenêtre : 1 an en arrière, 2 ans en avant
  const from = new Date();
  from.setFullYear(from.getFullYear() - 1);
  const fromStr = from.toISOString().substring(0, 10) + "T00:00:00+01:00";

  const params = new URLSearchParams({
    where:    `zones="Zone ${z}" and population="Élèves" and end_date>="${fromStr}"`,
    select:   "start_date,end_date",
    limit:    50,
    timezone: "Europe/Paris"
  });
  const url = `https://data.education.gouv.fr/api/explore/v2.1/catalog/datasets/fr-en-calendrier-scolaire/records?${params}`;
  try {
    const res  = await fetch(url);
    const json = await res.json();
    return (json.results || []).map(r => [
      r.start_date.substring(0,10),
      r.end_date.substring(0,10)
    ]);
  } catch(e) {
    console.warn("API vacances inaccessible", e);
    return [];
  }
}

function isVacance(dk, ranges) {
  return ranges.some(([s,e]) => dk >= s && dk <= e);
}


/* ════════════════════════════════
   CONSTRUCTION DU CALENDRIER
════════════════════════════════ */
async function buildCalendar() {
  const vacRanges = await fetchVacances(zone);
  const grid      = document.getElementById("calGrid");
  grid.innerHTML  = "";

  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month+1, 0).getDate();
  const startDow = (firstDay.getDay()+6) % 7; // 0=lundi
  const nbRows   = Math.ceil((startDow + lastDay) / 7);

  grid.style.gridTemplateRows = `auto repeat(${nbRows}, 1fr)`;

  /* En-têtes colonnes */
  grid.appendChild(document.createElement("div")); // vide au-dessus des numéros de semaine
  DAYS_SHORT.forEach((d, i) => {
    const h = document.createElement("div");
    h.className   = "cal-col-header";
    h.textContent = d;
    grid.appendChild(h);
  });

  /* Lignes semaine */
  for (let row = 0; row < nbRows; row++) {
    /* Numéro de semaine */
    const rowStart = row * 7 - startDow + 1;
    const refDate  = new Date(year, month, Math.max(1, rowStart));
    const wn       = document.createElement("div");
    wn.className   = "cal-week-num";
    wn.textContent = getISOWeek(refDate);
    grid.appendChild(wn);

    /* 7 cases */
    for (let col = 0; col < 7; col++) {
      const cellDay = row * 7 + col - startDow + 1;
      const cell    = document.createElement("div");

      if (cellDay < 1 || cellDay > lastDay) {
        cell.className = "day-cell empty";
      } else {
        const date  = new Date(year, month, cellDay);
        const dk    = dateKey(date);
        const isWE  = col >= 5;
        const isFer = holidayMap.has(dk);
        const isVac = !isFer && isVacance(dk, vacRanges);

        cell.className = "day-cell"
          + (isFer            ? " ferie"   : "")
          + (isVac            ? " vacance" : "")
          + (!isFer && isWE   ? " weekend" : "");

        /* Numéro du jour */
        const num = document.createElement("div");
        num.className   = "day-num";
        num.textContent = cellDay;
        cell.appendChild(num);

        /* Libellé férié */
        if (isFer) {
          const lbl = document.createElement("div");
          lbl.className   = "ferie-lbl";
          lbl.textContent = holidayMap.get(dk);
          cell.appendChild(lbl);
        }


      }

      grid.appendChild(cell);
    }
  }
}

/* ════════════════════════════════
   GESTION DU FORMAT A5 / B6
════════════════════════════════ */
function applyFormat() {
  const fmt  = document.getElementById("formatPicker").value;
  const body = document.body;
  const svg  = document.getElementById("cropSvg");
  const page = document.getElementById("mainPage");

  if (fmt === "B6") {
    body.classList.add("fmt-b6");

    const scaleX = 250 / 297;
    const scaleY = 176 / 210;
    const scale  = Math.min(scaleX, scaleY);

    page.style.transform       = `scale(${scale})`;
    page.style.transformOrigin = "top left";

    requestAnimationFrame(() => {
      const rect = page.getBoundingClientRect();

      const lb = document.getElementById("cropBottom");
      lb.setAttribute("x1", rect.left - 15);
      lb.setAttribute("y1", rect.bottom);
      lb.setAttribute("x2", rect.right + 15);
      lb.setAttribute("y2", rect.bottom);

      const lr = document.getElementById("cropRight");
      lr.setAttribute("x1", rect.right);
      lr.setAttribute("y1", rect.top - 15);
      lr.setAttribute("x2", rect.right);
      lr.setAttribute("y2", rect.bottom + 15);

      svg.style.display = "block";
      page.parentElement.style.paddingBottom =
        (page.offsetHeight * (1 - scale)) + "px";
    });

  } else {
    body.classList.remove("fmt-b6");
    page.style.transform = "";
    page.style.transformOrigin = "";
    page.parentElement.style.paddingBottom = "";
    svg.style.display = "none";
  }
}

// Init format A5 par défaut
applyFormat();

buildCalendar();
</script>
</body>
