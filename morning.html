<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma journée ✨</title>
  <link rel="stylesheet" href="style.css">
  <style></style>
</head>

<body>
  <div class="page">

    <!-- ══ Header ══ -->
    <div class="header">

      <div class="header-info">
        <div class="title-row">
          <h1>✨ Ma journée</h1>
          <div class="header-week"><span id="header-week"></span></div>
        </div>
        <div class="header-date" id="header-date"></div>
      </div>

      <!-- Centre : psy card -->
      <div class="header-center">
        <div class="psy-card" id="psy-card">
          <div class="psy-label">✦ Un moment pour toi</div>
          <div class="psy-text" id="psy-text"></div>
          <span class="psy-close" onclick="closePsy()">C'est bon, je reprends →</span>
        </div>
      </div>

      <div class="header-right">
        <div class="clock-wrap">
          <div class="clock" id="clock">00:00</div>
          <div class="seconds-bar">
            <div class="seconds-fill" id="seconds-fill"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- ══ Layout ══ -->
    <div class="layout">

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title pink">🗓 Planning</span>
          <span class="panel-header-center" id="planning-msg"></span>
          <span class="panel-header-right" id="planning-progress"></span>
        </div>
        <div id="planning-body"></div>
        <div class="progress-wrap">
          <div class="progress-label">
            <span>Progression</span>
            <span id="progress-pct">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>
      </div>

      <div class="right-col">

        <div class="panel">
          <div class="panel-header">
            <span class="panel-title cyan">🗒 Notes</span>
            <span class="panel-header-center"></span>
            <div class="panel-header-right">
              <button class="btn-resume panel-btn" onclick="openResume()">📋 Résumé</button>
            </div>
          </div>
          <div class="postit-body">
            <textarea class="postit-area"
              placeholder="Notes libres, idées, trucs à pas oublier...&#10;Ça disparaît ce soir 🌙"></textarea>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span class="panel-title purple">✅ À faire</span>
            <span class="panel-header-center" id="todo-msg"></span>
            <div class="panel-header-right">
              <button class="btn-craque panel-btn" onclick="openCraque()">Là je craque 🫠</button>
              <span id="todo-stats"></span>
            </div>
          </div>
          <div class="todo-body">
            <div class="todo-add">
              <input type="text" id="todo-input" placeholder="Ajouter une tâche..."
                onkeydown="if(event.key==='Enter') addTodo()">
              <button class="btn-add" onclick="addTodo()">+</button>
            </div>
            <div class="todo-list" id="todo-list"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Overlay craque -->
  <div class="overlay" id="craque-overlay">
    <div class="craque-card">
      <div class="craque-emoji" id="craque-emoji"></div>
      <div class="craque-title" id="craque-title"></div>
      <div class="craque-msg" id="craque-msg"></div>
      <div class="craque-actions">
        <button class="btn-dismiss" onclick="closeCraque()">Je continue quand même</button>
        <button class="btn-pause" onclick="takePause()">🌿 Je prends 5 min</button>
      </div>
    </div>
  </div>

  <!-- Overlay résumé -->
  <div class="overlay" id="resume-overlay">
    <div class="resume-card">
      <div class="resume-title">📋 Résumé de journée</div>
      <div class="resume-body" id="resume-body"></div>
      <div class="resume-actions">
        <button class="btn-close-resume" onclick="closeResume()">Fermer</button>
        <button class="btn-copy-resume" onclick="copyResume()">✨ Copier</button>
      </div>
    </div>
  </div>

  <script>
    // ── Date & semaine ────────────────────────────────────────
    const jours = ['dimanche', 'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];
    const mois = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];

    function getWeek(d) {
      const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const day = date.getUTCDay() || 7;
      date.setUTCDate(date.getUTCDate() + 4 - day);
      const y = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
      return Math.ceil((((date - y) / 86400000) + 1) / 7);
    }

    const now = new Date();
    document.getElementById('header-date').textContent =
      jours[now.getDay()] + ' ' + now.getDate() + ' ' + mois[now.getMonth()];
    document.getElementById('header-week').textContent = 'S' + getWeek(now);

    // ── Horloge ───────────────────────────────────────────────
    function updateClock() {
      const d = new Date();
      document.getElementById('clock').textContent =
        String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
      document.getElementById('seconds-fill').style.width = ((d.getSeconds() / 60) * 100) + '%';
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── Créneaux 8h00 → 17h30 ────────────────────────────────
    const slots = [];
    for (let h = 8; h <= 17; h++) {
      for (let m = 0; m < 60; m += 30) {
        if (h === 18) break;
        const label = String(h).padStart(2, '0') + 'h' + (m === 0 ? '00' : '30');
        const isDaily = (h === 9 && m === 0);
        const isLunch = (h === 12 && m === 30) || (h === 13);
        let defVal = '';
        if (h === 8 && m === 0) defVal = 'Mails';
        if (isDaily) defVal = 'Daily équipe';
        if (isLunch) defVal = 'Pause déjeuner';
        slots.push({ time: label, value: defVal, done: isDaily || isLunch, isDaily, isLunch });
      }
    }

    // ── Helpers groupes ──────────────────────────────────────
    // Détermine si un créneau est "absorbé" par le précédent (même texte non vide)
    function isMergedInto(i) {
      if (i === 0) return false;
      const cur = slots[i].value.trim().toLowerCase();
      const prev = slots[i - 1].value.trim().toLowerCase();
      return cur !== '' && cur === prev;
    }

    // Trouve le premier index du groupe auquel appartient i
    function groupStart(i) {
      while (i > 0 && isMergedInto(i)) i--;
      return i;
    }

    // Recalcule done en cascade à partir d'un index chef de groupe
    function propagateDone(startIdx, done) {
      const label = slots[startIdx].value.trim().toLowerCase();
      let j = startIdx;
      while (j < slots.length && slots[j].value.trim().toLowerCase() === label) {
        slots[j].done = done;
        j++;
      }
    }

    // Recalcule tous les groupes : si un créneau est absorbé, son done suit le chef
    function recomputeGroups() {
      for (let i = 1; i < slots.length; i++) {
        if (isMergedInto(i)) {
          slots[i].done = slots[groupStart(i)].done;
        }
      }
    }

    // ── Rendu planning ────────────────────────────────────────
    function renderPlanning() {
      recomputeGroups();
      const body = document.getElementById('planning-body');
      body.innerHTML = '';
      let done = 0;
      let validCount = 0;

      slots.forEach((slot, i) => {
        const isSpecial = (slot.isDaily && !slot.modified) || (slot.isLunch && !slot.modified);
        const absorbed = !isSpecial && isMergedInto(i); // absorbé dans un groupe
        const isChef = !isSpecial && !absorbed && slot.value.trim() !== ''; // chef de groupe ou créneau libre

        const row = document.createElement('div');
        row.className = 'slot'
          + (slot.done && !isSpecial ? ' done' : '')
          + (slot.isDaily && !slot.modified ? ' slot-daily' : '')
          + (slot.isLunch && !slot.modified ? ' slot-lunch' : '');

        // Case à cocher : visible uniquement pour le chef de groupe ou les spéciaux modifiés
        const showBtn = !isSpecial && !absorbed;
        const btnHtml = showBtn ? `
        <button class="slot-btn" onclick="toggleSlotDone(${i})">
          ${slot.done ? '✅' : '○'}
        </button>` : '<div style="width:30px;margin-right:4px"></div>';

        row.innerHTML = `
        <div class="slot-time">${slot.time}</div>
        <input class="slot-input" type="text"
          placeholder="Libre..."
          value="${slot.value}"
          onchange="onSlotChange(${i}, this.value)"
          oncontextmenu="copyFromPrevious(${i}); return false;"
          title="Clic droit pour copier le créneau précédent">
        ${btnHtml}
      `;
        body.appendChild(row);

        if (!isSpecial) {
          validCount++;
          if (slot.done) done++;
        }
      });

      const pct = validCount > 0 ? Math.round((done / validCount) * 100) : 0;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('planning-progress').textContent = done + '/' + validCount;
    }

    function onSlotChange(i, newVal) {
      slots[i].value = newVal;

      // Gestion libération daily/lunch
      if (slots[i].isDaily || slots[i].isLunch) {
        const orig = slots[i].isDaily ? 'Daily équipe' : 'Pause déjeuner';
        slots[i].modified = (newVal.trim() !== orig && newVal.trim() !== '');
        if (slots[i].modified) slots[i].done = false;
      }

      // Recalcul cascade : si ce créneau change, les suivants qui lui correspondaient
      // ne font peut-être plus partie du même groupe
      recomputeGroups();
      renderPlanning();
    }

    function toggleSlotDone(i) {
      const start = groupStart(i);
      const newDone = !slots[start].done;
      propagateDone(start, newDone);
      renderPlanning();
      if (newDone) showPsyInline('planning');
    }

    function copyFromPrevious(i) {
      if (i > 0) {
        slots[i].value = slots[i - 1].value;
        onSlotChange(i, slots[i].value);
      }
    }

    // ── Todo ──────────────────────────────────────────────────
    const todos = [];

    function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim();
      if (!text) return;
      todos.push({ text, done: false });
      input.value = '';
      renderTodos();
    }

    function toggleTodo(i) {
      todos[i].done = !todos[i].done;
      renderTodos();
      if (todos[i].done) showPsyInline('todo');
    }

    function deleteTodo(i, e) {
      e.stopPropagation();
      todos.splice(i, 1);
      renderTodos();
    }

    function renderTodos() {
      const list = document.getElementById('todo-list');
      list.innerHTML = '';
      todos.forEach((todo, i) => {
        const item = document.createElement('div');
        item.className = 'todo-item' + (todo.done ? ' done' : '');
        item.onclick = () => toggleTodo(i);
        item.innerHTML = `
        <div class="todo-check">${todo.done ? '✓' : ''}</div>
        <div class="todo-text">${todo.text}</div>
        <button class="btn-del" onclick="deleteTodo(${i}, event)">✕</button>
      `;
        list.appendChild(item);
      });
      const done = todos.filter(t => t.done).length;
      document.getElementById('todo-stats').textContent =
        todos.length > 0 ? done + '/' + todos.length : '';
    }

    // ── Messages psy ──────────────────────────────────────────
    const psyShort = {
      planning: ['Souffle 🌸', 'Micro-pause ✨', 'Tu gères 💜', 'Respire 🌙', 'Bien joué ⭐'],
      todo: ['Bien joué 🦄', 'Prends 2 min ✨', "C'est fait 💜", 'Tu bosses bien 🌸', 'Respire ⭐'],
    };

    const psyLong = {
      planning: [
        "Créneau bouclé 🌸 Prends 2 minutes, bois quelque chose, regarde ailleurs. C'est pas du temps perdu.",
        "C'est fait ✨ Ton cerveau a besoin de micro-pauses pour tenir la journée, pas juste toi.",
        "Un de moins 💜 Tu peux souffler 30 secondes sans que le monde s'effondre, promis.",
        "Fait 🌙 Lève les yeux de l'écran une minute. Ça compte vraiment.",
        "Bien joué ⭐ Tu gères et gérer ça mérite une vraie pause, pas juste passer au suivant.",
        "Pense à tes réserves d'énergie comme un compte en banque. Chaque tâche c'est un retrait, pas de pause c'est des frais. Prends 2 minutes pour faire un dépôt 🌿",
      ],
      todo: [
        "Tâche faite 🌸 Avant la suivante : respire, étire-toi, hydrate-toi.",
        "✓ 💜 Prendre le temps de cocher c'est reconnaître que t'as bossé.",
        "C'est coché 🌙 Si t'enchaînes sans pause, ton cerveau va facturer plus tard.",
        "Faite ✨ Tu peux te féliciter. C'était sur la liste, c'est fait, c'est réel.",
        "Une de moins ⭐ Prends 2 minutes pour toi avant la suivante.",
        "Bien joué 🦄 Chaque tâche cochée c'est une victoire, même les petites.",
        "Respire 🌿 Avant de te lancer dans la suivante, prends une vraie micro-pause.",
      ],
    };

    function showPsyInline(type) {
      const msgs = psyShort[type];
      const el = document.getElementById(type === 'planning' ? 'planning-msg' : 'todo-msg');
      el.textContent = msgs[Math.floor(Math.random() * msgs.length)];
      clearTimeout(el._t);
      el._t = setTimeout(() => { el.textContent = ''; }, 4000);

      const lmsgs = psyLong[type];
      document.getElementById('psy-text').textContent = lmsgs[Math.floor(Math.random() * lmsgs.length)];
      document.getElementById('psy-card').classList.add('visible');
    }

    function closePsy() {
      document.getElementById('psy-card').classList.remove('visible');
    }

    // ── Craque ────────────────────────────────────────────────
    let craqueCount = 0;

    const craqueMsgs = [
      {
        emoji: '🫠', title: 'Hey. Arrête-toi.',
        msg: "T'as le droit de craquer. Même au boulot, même un lundi matin, même si t'as une réunion dans 10 minutes. Prends 5 minutes vraies — pas 5 minutes à scroller, à t'arrêter pour de vrai."
      },
      {
        emoji: '🌸', title: "C'est beaucoup, là.",
        msg: "Burnout ça veut dire que ton corps et ta tête ont épuisé leurs réserves. Une pause maintenant c'est pas de la faiblesse, c'est de la maintenance préventive. T'es pas une machine."
      },
      {
        emoji: '💜', title: 'Tu fais trop.',
        msg: "Pas de jugement, juste un constat : si t'as cliqué ce bouton, c'est que quelque chose signale que ça va trop vite. Écoute ce signal. Il est là pour une raison."
      },
      {
        emoji: '🌙', title: 'Respire.',
        msg: "Sérieusement. Cinq vraies respirations lentes. Ensuite tu décides si tu continues ou si tu prends une vraie pause. Mais d'abord respire."
      },
      {
        emoji: '✨', title: 'La liste peut attendre.',
        msg: "Rien sur cette liste ne vaut le fait de tenir sur la durée. Cinq minutes maintenant ou une semaine d'arrêt maladie dans trois semaines. Le calcul est vite fait."
      },
      {
        emoji: '🦄', title: "T'as le droit.",
        msg: "Le droit de souffler. Le droit d'être fatiguée. Le droit de ne pas tout gérer parfaitement. Là maintenant, t'as juste le droit d'exister sans performer."
      },
      {
        emoji: '🌿', title: "Et si tu prenais une vraie pause ?",
        msg: "Pas cinq minutes à faire défiler des trucs sur ton téléphone, mais une vraie pause : debout, étirements, respiration, eau, soleil."
      },
      {
        emoji: '⭐', title: "C'est pas un échec, c'est un signal.",
        msg: "Ce bouton c'est pas un bouton de panique, c'est un bouton de signal. Il sert à dire que t'as besoin d'une pause avant que ça devienne plus sérieux. C'est un acte de prévoyance."
      },
    ];

    function openCraque() {
      craqueCount++;
      const msg = craqueMsgs[Math.floor(Math.random() * craqueMsgs.length)];
      document.getElementById('craque-emoji').textContent = msg.emoji;
      document.getElementById('craque-title').textContent = msg.title;
      document.getElementById('craque-msg').textContent = msg.msg;
      document.getElementById('craque-overlay').classList.add('visible');
    }

    function closeCraque() {
      document.getElementById('craque-overlay').classList.remove('visible');
    }

    function takePause() {
      closeCraque();
      document.getElementById('psy-text').textContent =
        "🌿 5 minutes. Loin de l'écran. T'as fait le bon choix, reviens quand t'es prête.";
      document.getElementById('psy-card').classList.add('visible');
    }

    document.getElementById('craque-overlay').addEventListener('click', function (e) {
      if (e.target === this) closeCraque();
    });

    // ── Résumé ────────────────────────────────────────────────
    function buildMergedSlots() {
      // On ne garde que les créneaux actifs (pas special non modifié, pas vide)
      const actifs = slots.filter(s =>
        s.value && s.value.trim() !== '' &&
        (s.modified || (!s.isDaily && !s.isLunch))
      );

      const merged = [];
      actifs.forEach(s => {
        const last = merged[merged.length - 1];
        if (last && last.value.trim().toLowerCase() === s.value.trim().toLowerCase()) {
          last.timeTo = s.time;
          last.done = last.done && s.done;
        } else {
          merged.push({ timeFrom: s.time, timeTo: null, value: s.value, done: s.done });
        }
      });
      return merged;
    }

    function openResume() {
      const d = new Date();
      const dateStr = jours[d.getDay()] + ' ' + d.getDate() + ' ' + mois[d.getMonth()];

      let txt = '✨ RÉSUMÉ — ' + dateStr + '\n';
      txt += '━'.repeat(36) + '\n\n';

      const merged = buildMergedSlots();
      if (merged.length > 0) {
        txt += '🗓 PLANNING\n';
        merged.forEach(s => {
          let plage = s.timeFrom;
          if (s.timeTo) {
            // timeTo = début du dernier créneau → fin = timeTo + 30min
            const [hh, mm] = s.timeTo.replace('h', ':').split(':').map(Number);
            const endMin = hh * 60 + mm + 30;
            const endH = String(Math.floor(endMin / 60)).padStart(2, '0');
            const endM = String(endMin % 60).padStart(2, '0');
            plage = s.timeFrom + ' → ' + endH + 'h' + endM;
          }
          txt += '  ' + (s.done ? '✓' : '○') + ' ' + plage + '  ' + s.value + '\n';
        });
        txt += '\n';
      }

      const done = todos.filter(t => t.done);
      const left = todos.filter(t => !t.done);

      if (done.length > 0) {
        txt += '✅ TÂCHES FAITES (' + done.length + ')\n';
        done.forEach(t => { txt += '  ✓ ' + t.text + '\n'; });
        txt += '\n';
      }
      if (left.length > 0) {
        txt += '⏳ TÂCHES RESTANTES (' + left.length + ')\n';
        left.forEach(t => { txt += '  ○ ' + t.text + '\n'; });
        txt += '\n';
      }
      if (todos.length === 0) txt += '📋 Aucune tâche saisie\n\n';

      const notes = document.querySelector('.postit-area').value.trim();
      if (notes) txt += '🗒 NOTES\n' + notes + '\n\n';

      txt += '━'.repeat(36) + '\n';
      const slotsDone = merged.filter(s => s.done).length;
      txt += '📊 ' + slotsDone + '/' + merged.length + ' créneaux · ';
      txt += done.length + '/' + todos.length + ' tâches';
      if (craqueCount > 0)
        txt += ' · 🫠 ' + craqueCount + ' craquage' + (craqueCount > 1 ? 's' : '');
      txt += '\n';

      document.getElementById('resume-body').textContent = txt;
      document.getElementById('resume-overlay').classList.add('visible');
    }

    function closeResume() {
      document.getElementById('resume-overlay').classList.remove('visible');
    }

    function copyResume() {
      navigator.clipboard.writeText(document.getElementById('resume-body').textContent).then(() => {
        const btn = document.querySelector('.btn-copy-resume');
        btn.textContent = '✓ Copié !';
        setTimeout(() => { btn.textContent = '✨ Copier'; }, 2000);
      });
    }

    document.getElementById('resume-overlay').addEventListener('click', function (e) {
      if (e.target === this) closeResume();
    });

    // ── Init ──────────────────────────────────────────────────
    renderPlanning();
    renderTodos();
  </script>
</body>

</html>
