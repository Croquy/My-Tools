<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agenda Hebdomadaire</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Handlee&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ─── Variables globales ─── */
:root {
  --accent: #B8A1D9;
  --pastel: #F3ECFF;
  --text: #444;
  --border: 1.5px solid var(--accent);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 20px;
  background: #f3f3f3;
  font-family: 'Inter', sans-serif;
  color: var(--text);
}

/* ─── Contrôles (masqués à l'impression) ─── */
.controls {
  width: 1120px;
  margin: auto auto 20px;
  background: white;
  border-radius: 18px;
  padding: 16px;
  border: 1px solid #ddd;
}

.controls-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
}

input, textarea {
  width: 100%;
  border-radius: 12px;
  border: 1px solid #ccc;
  padding: 10px;
  font-family: inherit;
}

textarea { resize: none; height: 100px; }

button {
  border: none;
  border-radius: 12px;
  padding: 10px 18px;
  background: var(--accent);
  color: white;
  cursor: pointer;
  font-weight: 600;
}

/* ─── Page A4 paysage ─── */
.page {
  width: 297mm;
  height: 210mm;
  background: white;
  margin: auto;
  display: flex;
  overflow: hidden;
  position: relative; /* ← nécessaire pour les traits de coupe en absolute */
}

/* ─── Moitié gauche / droite ─── */
.half {
  width: 148.5mm;
  height: 210mm;
  padding: 10mm;
}

/* ─── Bloc générique (bordure arrondie) ─── */
.block {
  border: var(--border);
  border-radius: 16px;
  padding: 8px;
  background: white;
}

/* ─── Titres cursive ─── */
.block-title {
  font-family: 'Handlee', cursive;
  color: var(--accent);
  text-align: center;
  font-size: 22px;
}

.small-title { font-size: 18px; margin-bottom: 2px; }

/* ══════════════════════════
   PAGE GAUCHE
══════════════════════════ */
.left-page {
  display: flex;
  flex-direction: column;
  gap: 8px;
  height: 100%;
  border-right: 1px dashed rgba(0,0,0,0.12);
}

/* ── Haut : calendrier + bloc Semaine ── */
.top-section {
  height: 20%;
  display: flex;
  gap: 8px;
}

.calendar-block  { width: 35%; }
.semaine-block   { width: 65%; }

/* ── Milieu : todo + thèmes (Orga & Équipe) ── */
.middle-section {
  height: 50%;
  display: flex;
  gap: 8px;
}

.todo-block { width: 35%; }

.themes-block {
  width: 65%;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.theme-box { flex: 1; }

/* ── Bas : Pensées (fond pastel) ── */
.bottom-section { height: 30%; }

.pensees {
  height: 100%;
  background: var(--pastel);
  border-radius: 20px;
  padding: 12px;
}

/* ─── Lignes de papier réglé ─── */
.write-lines,
.day-content,
.pensees-lines {
  background-image: repeating-linear-gradient(
    to bottom,
    transparent, transparent 23px,
    rgba(0,0,0,0.08) 24px
  );
}

.write-lines   { height: calc(100% - 28px); }
.pensees-lines { height: calc(100% - 35px); }

/* ─── Todo : cases à cocher réparties sur la hauteur ─── */
.todo-lines {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: calc(100% - 28px);
  margin-top: 4px;
  padding-bottom: 12px;
}

.todo-line {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  min-height: 16px;
}

.checkbox {
  width: 14px;
  height: 14px;
  border: var(--border);
  border-radius: 4px;
  flex-shrink: 0;
}

/* ─── Numéro de semaine dans le calendrier ─── */
.calendar .week-num {
  color: var(--accent);
  font-weight: 700;
  font-size: 8px;
  text-align: center;
  opacity: 0.85;
  padding: 2px 1px;
  white-space: nowrap;
}

/* ══════════════════════════
   PAGE DROITE — Jours
══════════════════════════ */
.right-page {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: repeat(3, 1fr);
  gap: 8px;
  height: 100%;
}

.day-block {
  display: flex;
  flex-direction: column;
}

.day-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Handlee', cursive;
  color: var(--accent);
  font-size: 22px;
  margin-bottom: 4px;
}

.day-ferie-lbl {
  font-size: 10px;
  font-family: 'Handlee', cursive;
  color: var(--accent);
  opacity: 0.65;
  font-style: italic;
  flex: 1;
  text-align: center;
}

.day-content { flex: 1; }

/* ─── Mini calendrier mensuel ─── */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  font-size: 9px;
  text-align: center;
}

.calendar div { padding: 2px; border-radius: 6px; }

.calendar .dow {
  font-weight: 600;
  color: var(--accent);
  font-size: 8px;
  padding: 3px 0;
}

.calendar .weekday-last {
  border-right: 1.5px solid var(--accent);
  opacity: 0.9;
}

.active-week { background: var(--pastel); font-weight: bold; }

.calendar .jour-ferie {
  background: var(--accent);
  color: white;
  font-weight: 700;
  border-radius: 4px;
}

.calendar .vacance {
  text-decoration: underline;
  text-decoration-color: var(--accent);
  text-decoration-thickness: 1.5px;
  font-style: italic;
}

/* ─── Format B6 ─── */
body.fmt-b6 .page {
  transform-origin: top left;
}

/* ─── Traits de coupe B6 (positionnés dans .page en absolute) ─── */
#cropSvg {
  display: none;
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 999;
  overflow: visible;
}

/* ─── Impression ─── */
@media print {
  body { background: white; padding: 0; }
  .controls { display: none; }
  .page { margin: 0; }
  @page { size: A4 landscape; margin: 0; }
}
</style>
</head>

/* ════════════════════════════════
   UTILITAIRES DE DATES ISO
════════════════════════════════ */
function getISOWeek(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const week1 = new Date(d.getFullYear(), 0, 4);
  return 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

function getMondayFromISOWeek(year, weekNum) {
  const simple = new Date(year, 0, 1 + (weekNum - 1) * 7);
  const dow = simple.getDay();
  const monday = new Date(simple);
  monday.setDate(simple.getDate() + (dow <= 4 ? 1 - dow : 8 - dow));
  return monday;
}

function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}


/* ════════════════════════════════
   JOURS FÉRIÉS FRANÇAIS
════════════════════════════════ */
function easterSunday(year) {
  const a = year % 19, b = Math.floor(year/100), c = year % 100;
  const d = Math.floor(b/4), e = b % 4, f = Math.floor((b+8)/25);
  const g = Math.floor((b-f+1)/3), h = (19*a+b-d-g+15) % 30;
  const i = Math.floor(c/4), k = c % 4;
  const l = (32+2*e+2*i-h-k) % 7;
  const m = Math.floor((a+11*h+22*l)/451);
  const month = Math.floor((h+l-7*m+114)/31) - 1;
  const day   = ((h+l-7*m+114) % 31) + 1;
  return new Date(year, month, day);
}

function getHolidays(year) {
  const easter = easterSunday(year);
  const add = (date, days) => {
    const d = new Date(date); d.setDate(d.getDate() + days); return d;
  };
  const key = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return new Set([
    `${year}-01-01`,
    key(add(easter, 1)),
    `${year}-05-01`,
    `${year}-05-08`,
    key(add(easter, 39)),
    key(add(easter, 50)),
    `${year}-07-14`,
    `${year}-08-15`,
    `${year}-11-01`,
    `${year}-11-11`,
    `${year}-12-25`,
  ]);
}

function getHolidayMap(year) {
  const easter = easterSunday(year);
  const add = (date, days) => {
    const d = new Date(date); d.setDate(d.getDate() + days); return d;
  };
  const key = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const map = new Map();
  map.set(`${year}-01-01`,    "Jour de l'An");
  map.set(key(add(easter,1)), "Lundi de Pâques");
  map.set(`${year}-05-01`,    "Fête du Travail");
  map.set(`${year}-05-08`,    "Victoire 1945");
  map.set(key(add(easter,39)),"Ascension");
  map.set(key(add(easter,50)),"Lundi de Pentecôte");
  map.set(`${year}-07-14`,    "Fête nationale");
  map.set(`${year}-08-15`,    "Assomption");
  map.set(`${year}-11-01`,    "Toussaint");
  map.set(`${year}-11-11`,    "Armistice");
  map.set(`${year}-12-25`,    "Noël");
  return map;
}


/* ════════════════════════════════
   VACANCES SCOLAIRES — API
════════════════════════════════ */
const vacancesCache = {};

async function fetchVacances(zone) {
  if (vacancesCache[zone]) return vacancesCache[zone];
  const from = new Date();
  from.setFullYear(from.getFullYear() - 1);
  const fromStr = from.toISOString().substring(0, 10) + "T00:00:00+01:00";
  const params = new URLSearchParams({
    where:    `zones="Zone ${zone}" and population="Élèves" and end_date>="${fromStr}"`,
    select:   "start_date,end_date",
    limit:    50,
    timezone: "Europe/Paris"
  });
  const url = `https://data.education.gouv.fr/api/explore/v2.1/catalog/datasets/fr-en-calendrier-scolaire/records?${params}`;
  try {
    const res  = await fetch(url);
    const json = await res.json();
    const ranges = (json.results || []).map(r => [
      r.start_date.substring(0, 10),
      r.end_date.substring(0, 10)
    ]);
    vacancesCache[zone] = ranges;
    return ranges;
  } catch (e) {
    console.warn("Impossible de charger les vacances scolaires :", e);
    return [];
  }
}

function isVacance(date, ranges) {
  const key = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  return ranges.some(([start, end]) => key >= start && key <= end);
}


/* ════════════════════════════════
   CALENDRIER MENSUEL MINIATURE
════════════════════════════════ */
async function generateCalendar(mondayDate) {
  const months = [
    "Janvier","Février","Mars","Avril","Mai","Juin",
    "Juillet","Août","Septembre","Octobre","Novembre","Décembre"
  ];

  const year       = mondayDate.getFullYear();
  const month      = mondayDate.getMonth();
  const lastDay    = new Date(year, month + 1, 0);
  const startDay   = (new Date(year, month, 1).getDay() + 6) % 7;
  const activeWeek = getISOWeek(mondayDate);
  const zone       = document.getElementById("zonePicker").value;

  const holidays  = new Set([...getHolidays(year), ...getHolidays(year + 1)]);
  const vacRanges = zone !== 'none' ? await fetchVacances(zone) : [];

  document.getElementById("calendarTitle").textContent = `${months[month]} ${year}`;
  document.getElementById("semaineNum").textContent    = `Semaine ${activeWeek}`;

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";
  cal.style.gridTemplateColumns = "min-content repeat(7, 1fr)";

  const emptyHeader = document.createElement("div");
  emptyHeader.innerHTML = "&nbsp;";
  cal.appendChild(emptyHeader);
  ["L","M","M","J","V","S","D"].forEach((d, i) => {
    const h = document.createElement("div");
    h.className = "dow" + (i === 4 ? " weekday-last" : "");
    h.textContent = d;
    cal.appendChild(h);
  });

  let day = 1 - startDay;
  while (day <= lastDay.getDate()) {
    const refDay  = day < 1 ? 1 : day;
    const refDate = new Date(year, month, refDay);
    const wNum    = document.createElement("div");
    wNum.className = "week-num";
    wNum.textContent = getISOWeek(refDate);
    cal.appendChild(wNum);

    for (let col = 0; col < 7; col++, day++) {
      const div = document.createElement("div");
      if (day < 1 || day > lastDay.getDate()) {
        div.innerHTML = "&nbsp;";
      } else {
        const current = new Date(year, month, day);
        const dk      = dateKey(year, month, day);
        div.textContent = day;
        if (getISOWeek(current) === activeWeek) div.classList.add("active-week");
        if (col === 4) div.classList.add("weekday-last");
        if (holidays.has(dk)) {
          div.classList.add("jour-ferie");
        } else if (zone !== 'none' && isVacance(current, vacRanges)) {
          div.classList.add("vacance");
        }
      }
      cal.appendChild(div);
    }
  }
}


/* ════════════════════════════════
   MISE À JOUR COMPLÈTE (async)
════════════════════════════════ */
async function updateWeek() {
  const val = document.getElementById("weekPicker").value;
  if (!val) return;

  const [year, weekStr] = val.split("-W");
  const monday = getMondayFromISOWeek(parseInt(year), parseInt(weekStr));

  applyWeekTheme(parseInt(weekStr));
  await generateCalendar(monday);

  const yr   = monday.getFullYear();
  const hols = new Map([...getHolidayMap(yr), ...getHolidayMap(yr + 1)]);

  for (let i = 0; i < 5; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dateSpans[i].textContent = `${d.getDate()}/${d.getMonth() + 1}`;
    const dk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    ferieSpans[i].textContent = hols.has(dk) ? hols.get(dk) : "";
  }

  const sat = new Date(monday); sat.setDate(monday.getDate() + 5);
  const sun = new Date(monday); sun.setDate(monday.getDate() + 6);
  dateSpans[5].textContent  = `${sat.getDate()} - ${sun.getDate()}/${sun.getMonth() + 1}`;
  ferieSpans[5].textContent = "";
}

document.getElementById("weekPicker").addEventListener("change", updateWeek);
document.getElementById("zonePicker").addEventListener("change", updateWeek);

function ouvrirMois() {
  const val  = document.getElementById("weekPicker").value;
  const zone = document.getElementById("zonePicker").value;
  if (!val) return;
  const [year, weekStr] = val.split("-W");
  const monday = getMondayFromISOWeek(parseInt(year), parseInt(weekStr));
  const mois = `${monday.getFullYear()}-${String(monday.getMonth()+1).padStart(2,"0")}`;
  window.open(`agenda-mois.html?mois=${mois}&zone=${zone}`, "_blank");
}


/* ════════════════════════════════
   FORMAT A5 / B6
   Les traits sont dans .page (position:absolute)
   → coordonnées relatives à la page, pas à l'écran
════════════════════════════════ */
function applyFormat() {
  const fmt  = document.getElementById("formatPicker").value;
  const body = document.body;
  const svg  = document.getElementById("cropSvg");
  const page = document.getElementById("mainPage");

  if (fmt === "B6") {
    body.classList.add("fmt-b6");

    const scaleX = 250 / 297;
    const scaleY = 176 / 210;
    const scale  = Math.min(scaleX, scaleY);

    page.style.transform       = `scale(${scale})`;
    page.style.transformOrigin = "top left";

    // Dimensions internes de la page (avant scale, en px)
    const pw = page.offsetWidth;
    const ph = page.offsetHeight;

    // Position des traits en coordonnées internes (= ratio B6/A4 × dimension page)
    const cutW = (250 / 297) * pw;
    const cutH = (176 / 210) * ph;

    const lb = document.getElementById("cropBottom");
    lb.setAttribute("x1", -15);
    lb.setAttribute("y1", cutH);
    lb.setAttribute("x2", cutW + 15);
    lb.setAttribute("y2", cutH);

    const lr = document.getElementById("cropRight");
    lr.setAttribute("x1", cutW);
    lr.setAttribute("y1", -15);
    lr.setAttribute("x2", cutW);
    lr.setAttribute("y2", cutH + 15);

    svg.style.display = "block";

    // Compense l'espace laissé vide par le scale dans le flux
    page.parentElement.style.paddingBottom =
      (page.offsetHeight * (1 - scale)) + "px";

  } else {
    body.classList.remove("fmt-b6");
    page.style.transform = "";
    page.style.transformOrigin = "";
    page.parentElement.style.paddingBottom = "";
    svg.style.display = "none";
  }
}

applyFormat();


/* ════════════════════════════════
   TITRES DES BLOCS (localStorage)
════════════════════════════════ */
function loadTitres() {
  const t1 = localStorage.getItem("bloc_titre1") || "Orga";

  document.getElementById("titre2").value = t2;
  document.getElementById("labelTitre1").textContent = t1;
  document.getElementById("labelTitre2").textContent = t2;
}

function saveTitres() {
  const t1 = document.getElementById("titre1").value || "Orga";
  const t2 = document.getElementById("titre2").value || "Équipe";
  localStorage.setItem("bloc_titre1", t1);
  localStorage.setItem("bloc_titre2", t2);
  document.getElementById("labelTitre1").textContent = t1;
  document.getElementById("labelTitre2").textContent = t2;
}

loadTitres();

const currentWeek = `${now.getFullYear()}-W${String(getISOWeek(now)).padStart(2, "0")}`;
document.getElementById("weekPicker").value = currentWeek;
updateWeek();
