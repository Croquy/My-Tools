<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comportement - My Tools</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Mobile-specific adjustments for comportement.html */
  @media (max-width: 860px) {
    #header-controls {
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .header-center {
      display: flex !important;
      width: 100%;
      justify-content: center;
      align-items: center;
    }

    #header-month-controls {
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }

    #month-label {
      min-width: 120px;
    }

    #btn-shop-toggle {
      min-width: auto;
      flex: 0 1 auto;
      font-size: 12px;
      padding: 6px 10px;
    }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header no-print">
    <div class="header-info">
      <div class="title-row"><h1 style="cursor:pointer;font-size:32px;margin:0" onclick="showView('accueil')">Comportement</h1></div>
    </div>
    <div class="header-center" id="header-child-select-container">
      <div id="header-controls" style="display:flex;align-items:center;gap:12px">
        <!-- le select d'enfant est injecté ici par selectChildInHeader() -->
        <div id="header-child-wrap"></div>
        <div id="header-month-controls" style="display:flex;align-items:center;gap:8px">
          <button class="btn-icon" onclick="changeMonth(-1)">‹</button>
          <span id="month-label" style="font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;min-width:140px;text-align:center"></span>
          <button class="btn-icon" onclick="changeMonth(1)">›</button>
        </div>
        <span id="month-pearl-badge" style="background:var(--cyan-light);border:1px solid rgba(139,233,253,.3);border-radius:20px;padding:5px 14px;font-size:14px;color:var(--cyan);font-weight:700">🔮 0 perle</span>
        <button class="btn-sm" id="btn-shop-toggle" onclick="toggleShopView()">🛍 Magasin</button>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-sm" id="btn-admin-access" onclick="askAdminPwd()">🔐 Admin</button>
    </div>
  </div>

  <div class="nav-tabs no-print">
    <!-- Boutons Accueil et Magasin retirés (accessible ailleurs) -->
  </div>

  <!-- ACCUEIL -->
  <div class="view active" id="view-accueil">
    <div class="child-cards" id="home-cards"></div>
    <p id="home-empty" style="display:none;color:var(--text-dim);margin-top:16px">Aucun enfant — allez dans <strong>Admin</strong> pour en ajouter.</p>
  </div>

  <!-- MENSUEL -->
  <div class="view" id="view-mensuel">
    <!-- Header controls moved to the page header -->
    <div style="height:8px"></div>

    <div class="print-only print-month-header">
      <div class="print-title" id="print-title"></div>
      <div class="print-subtitle" id="print-subtitle"></div>
    </div>

    <div class="panel-section">
      <div class="section-title">🎯 Objectifs du mois</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px" class="objectives-grid">
        <div class="obj-wrap"><span class="label-sm">Objectif 1</span><input class="field" id="obj1" placeholder="Ex: Ranger ma chambre" onfocus="trackObjectiveFocus(1)" oninput="saveObjectives()" onblur="handleObjectiveBlur(1)"></div>
        <div class="obj-wrap"><span class="label-sm">Objectif 2</span><input class="field" id="obj2" placeholder="Ex: Faire mes devoirs" onfocus="trackObjectiveFocus(2)" oninput="saveObjectives()" onblur="handleObjectiveBlur(2)"></div>
        <div class="obj-wrap"><span class="label-sm">Objectif 3</span><input class="field" id="obj3" placeholder="Ex: Être gentil avec..." onfocus="trackObjectiveFocus(3)" oninput="saveObjectives()" onblur="handleObjectiveBlur(3)"></div>
      </div>
    </div>

    <div class="weeks-section" id="weeks-container"></div>

    <div class="panel-section" id="month-summary">
      <div class="section-title">📊 Résumé du mois</div>
      <div class="summary-grid" id="summary-grid"></div>
    </div>

    <div class="no-print" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">
      <button class="btn secondary" onclick="printMonth()">🖨 Imprimer / PDF</button>
      <button class="btn secondary" onclick="exportJSON()">⬇ Export JSON</button>
    </div>
  </div>

  <!-- MAGASIN -->
  <div class="view" id="view-magasin">
    <!-- Compteur de perles retiré, visible dans l'en-tête -->
    <div class="panel-section">
      <div class="section-title">🛍 Magasin</div>
      <div class="shop-grid" id="shop-grid"></div>
    </div>
    <div class="panel-section">
      <div class="section-title">📜 Historique</div>
      <div class="history-list" id="history-list"></div>
    </div>
  </div>

  <!-- ADMIN -->
  <div class="view" id="view-admin">
    <div class="panel-section">
      <div class="section-title">👧 Enfants</div>
      <div class="admin-list" id="admin-children-list"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input class="field field-round" id="new-child-name" placeholder="Prénom" style="flex:1">
        <button class="btn" onclick="addChild()">+ Ajouter</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="section-title">🛍 Articles du magasin</div>
      <div class="admin-list" id="admin-items-list"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input class="field field-round" id="new-item-name" placeholder="Nom de l'article" style="flex:1">
        <input class="field field-round" type="number" id="new-item-price" min="1" placeholder="Prix 🔮" style="max-width:110px">
        <button class="btn" onclick="addShopItem()">+ Ajouter</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="section-title">💾 Données</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn" onclick="exportJSON()">⬇ Exporter (JSON)</button>
        <label class="btn" style="cursor:pointer">⬆ Importer JSON<input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label>
        <button class="btn btn-danger" onclick="if(confirm('Effacer toutes les données ?'))clearAll()">🗑 Tout effacer</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL BÊTISES -->
<div class="modal-overlay" id="betise-modal">
  <div class="modal-card">
    <div class="modal-title" id="betise-modal-title">Bêtises</div>
    <div id="betise-list"></div>
    <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
      <div class="label-sm" style="display:block;margin-bottom:8px">AJOUTER UNE BÊTISE</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <input type="date" class="field" id="betise-date-input">
        <input class="field" id="betise-comment" placeholder="Description...">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeBetiseModal()">Fermer</button>
      <button class="btn" onclick="addBetise()">Ajouter</button>
    </div>
  </div>
</div>

<!-- MODAL MOT DE PASSE ADMIN -->
<div class="modal-overlay" id="pwd-modal">
  <div class="modal-card" style="max-width:340px">
    <div class="modal-title">🔒 Accès Admin</div>
    <input class="field" type="password" id="pwd-input" placeholder="Mot de passe..." onkeydown="if(event.key==='Enter')checkPwd()">
    <p id="pwd-error" style="color:#ff5555;font-size:13px;margin-top:8px;display:none">Mot de passe incorrect.</p>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closePwdModal()">Annuler</button>
      <button class="btn" onclick="checkPwd()">Entrer</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="tools/firebase-service.js"></script>
<script>
// ── Data ──────────────────────────────────────────────────────
// Firebase SDK et service seront chargés avant ce script si souhaité
const LS={
  get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};
const getData=()=>LS.get('comportement_data')||{children:[],shopItems:[]};

async function saveData(d){
  LS.set('comportement_data',d);
  if(window.FirestoreService && FirestoreService.initialized){
    try{ await FirestoreService.setDoc('comportement','global',d); }catch(e){console.warn('Erreur sauvegarde global Firebase:',e);} 
  }
}

const getMonthData=(cid,y,m)=>LS.get(`comp_m_${cid}_${y}_${m}`)||{objectives:['','',''],weeks:{},betises:[]};

async function saveMonthData(cid,y,m,md){
  LS.set(`comp_m_${cid}_${y}_${m}`,md);
  if(window.FirestoreService && FirestoreService.initialized){
    const id = `comp_m_${cid}_${y}_${m}`;
    try{ await FirestoreService.setDoc('comportement_months', id, md); }catch(e){console.warn('Erreur sauvegarde month Firebase:',e);} 
  }
}
const getChild=id=>getData().children.find(c=>c.id===id);

// ── State ─────────────────────────────────────────────────────
let curY=new Date().getFullYear(), curM=new Date().getMonth()+1;
const MFR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MFR_min=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const colLabel=c=>c==='green'?'Vert':c==='yellow'?'Jaune':c==='red'?'Rouge':'—';
const pearlsFor=n=>n==='green'?2:n==='yellow'?1:0;
const esc=s=>(s||'').replace(/"/g,'&quot;');
const fmtD=d=>d.getDate()+'/'+(d.getMonth()+1);
const fmtISO=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const fmtFR=d=>{const date=new Date(d);return date.getDate()+' '+MFR_min[date.getMonth()]+' '+date.getFullYear();};

// ── Week calc ─────────────────────────────────────────────────
function getWeeks(year,month){
  const weeks=[], daysInMonth=new Date(year,month,0).getDate();
  // Build a set of all dates in this month
  const monthDates=new Set();
  for(let d=1;d<=daysInMonth;d++) monthDates.add(d);

  // Find monday of the week containing day 1
  const firstDay=new Date(year,month-1,1);
  const dow=firstDay.getDay(); // 0=Sun
  let monOffset=dow===0?-6:1-dow; // days to go back to reach Monday
  let monDate=new Date(year,month-1,1+monOffset);

  while(true){
    // ISO week number
    const u=new Date(Date.UTC(monDate.getFullYear(),monDate.getMonth(),monDate.getDate()));
    const dw=u.getUTCDay()||7; u.setUTCDate(u.getUTCDate()+4-dw);
    const y1=new Date(Date.UTC(u.getUTCFullYear(),0,1));
    const wn=Math.ceil((((u-y1)/86400000)+1)/7);

    const sunDate=new Date(monDate); sunDate.setDate(sunDate.getDate()+6);

    // All 7 days, flagged as in-month or not
    const allDays=[];
    for(let i=0;i<7;i++){
      const dd=new Date(monDate); dd.setDate(monDate.getDate()+i);
      allDays.push({day:dd.getDate(), inMonth: dd.getFullYear()===year && dd.getMonth()+1===month});
    }
    const hasInMonth=allDays.some(d=>d.inMonth);
    if(hasInMonth){
      weeks.push({wn, start:new Date(monDate), end:sunDate, allDays});
    }

    // Stop when the week starts after the last day of the month
    monDate.setDate(monDate.getDate()+7);
    if(monDate.getFullYear()>year || (monDate.getFullYear()===year && monDate.getMonth()+1>month)) break;
  }
  return weeks;
}

// ── Radio builder ─────────────────────────────────────────────
let _rid=0;
function tlRadio(val,fnName,args){
  const id='tl'+(++_rid);
  const col=c=>`<span class="tl-${c[0]}">
    <input type="radio" id="${id}_${c}" name="${id}" value="${c}" ${val===c?'checked':''}
      onchange="${fnName}(${args},'${c}')">
    <label for="${id}_${c}"><span></span></label>
  </span>`;
  return `<div class="tl-radio">${col('green')}${col('yellow')}${col('red')}</div>`;
}
function printCircle(val){
  return `<span class="print-circle${val?' pc-'+val:''}"></span>`;
}

// ── Admin password ────────────────────────────────────────────
function askAdminPwd(){
  document.getElementById('pwd-input').value='';
  document.getElementById('pwd-error').style.display='none';
  document.getElementById('pwd-modal').classList.add('visible');
  setTimeout(()=>document.getElementById('pwd-input').focus(),100);
}
function checkPwd(){
  const pwd = document.getElementById('pwd-input').value;
  if(FirestoreService.checkAdminPassword(pwd)){
    closePwdModal();
    showView('admin');
  } else {
    document.getElementById('pwd-error').style.display='block';
    document.getElementById('pwd-input').value='';
    document.getElementById('pwd-input').focus();
  }
}
function closePwdModal(){document.getElementById('pwd-modal').classList.remove('visible');}
document.getElementById('pwd-modal').addEventListener('click',e=>{if(e.target===document.getElementById('pwd-modal'))closePwdModal();});

// ── Navigation ────────────────────────────────────────────────
/**
 * Sélectionne un enfant et affiche son sélecteur dans l'en-tête
 * @param {string} childId ID de l'enfant à sélectionner
 */
function selectChildInHeader(childId){
  const container = document.getElementById('header-child-wrap');
  const d=getData();
  container.innerHTML=`<select id="header-child-select" name="header-child-select" class="styled-select" style="margin:0" onchange="updateHeaderChildSelect()">
    <option value="">-- Sélectionne un enfant --</option>
    ${d.children.map(c=>`<option value="${c.id}" ${c.id===childId?'selected':''}>${c.name}</option>`).join('')}
  </select>`;
  const sel = container.querySelector('select');
  if(childId) sel.value = childId;
  window.currentHeaderChildId = childId;
}
/**
 * Met à jour l'ID de l'enfant courant depuis le sélecteur d'en-tête
 */
function updateHeaderChildSelect(){
  const childId = document.querySelector('#header-child-wrap select')?.value || '';
  window.currentHeaderChildId = childId;
  // Mettre à jour la vue active si besoin
  if(document.getElementById('view-mensuel')?.classList.contains('active')) renderMonthView();
  if(document.getElementById('view-magasin')?.classList.contains('active')) renderShop();
}
function showView(v){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  const map={accueil:'Accueil',magasin:'Magasin',admin:'Admin'};
  document.querySelectorAll('.nav-tab').forEach(e=>{if(e.textContent.includes(map[v]))e.classList.add('active');});
  if(v==='accueil'){renderHome();}
  if(v==='magasin'){if(!window.currentHeaderChildId){const d=getData();if(d.children.length)selectChildInHeader(d.children[0].id);} renderShop();}
  if(v==='admin')renderAdmin();
  // Met à jour l'état du bouton magasin dans l'en-tête
  updateShopButton();
}

function toggleShopView(){
  if(document.getElementById('view-magasin').classList.contains('active')){
    showView('mensuel'); renderMonthView();
  } else {
    showView('magasin'); renderShop();
  }
}

function updateShopButton(){
  const btn = document.getElementById('btn-shop-toggle'); if(!btn) return;
  if(document.getElementById('view-magasin').classList.contains('active')){
    btn.textContent = '📋 Objectifs';
  } else {
    btn.textContent = '🛍 Magasin';
  }
}
function populateSelects(){
  const d=getData();
  // On n'utilise plus de selects internes — on remplit uniquement le sélecteur d'en-tête
  if(d.children.length){
    const headId = window.currentHeaderChildId || d.children[0].id;
    selectChildInHeader(headId);
  } else {
    const container = document.getElementById('header-child-wrap'); if(container) container.innerHTML='';
  }
}

// ── Home ──────────────────────────────────────────────────────
function renderHome(){
  populateSelects();
  const d=getData(),cont=document.getElementById('home-cards'),empty=document.getElementById('home-empty');
  cont.innerHTML='';
  if(!d.children.length){empty.style.display='block';return;}
  empty.style.display='none';
  d.children.forEach(c=>{
    const now=new Date();let objs=['','',''];
    for(let i=0;i<3;i++){
      const m=now.getMonth()+1-i,yr=m<=0?now.getFullYear()-1:now.getFullYear(),mo=((m-1+12)%12)+1;
      const md=getMonthData(c.id,yr,mo);
      if(md.objectives.some(o=>o)){objs=md.objectives;break;}
    }
    const el=document.createElement('div');el.className='child-card';
    el.onclick=()=>{selectChildInHeader(c.id);showView('mensuel');renderMonthView();};
    el.innerHTML=`<div class="child-card-name">${c.name}</div>
      <div class="child-card-pearls" style="cursor:pointer" onclick="event.stopPropagation();selectChildInHeader('${c.id}');showView('mensuel');renderMonthView();">🔮 ${c.pearls||0} perle${(c.pearls||0)!==1?'s':''}</div>
      <div style="font-size:13px;color:var(--text-dim);line-height:1.7">${objs.map((o,i)=>`<div>· ${o||'Objectif '+(i+1)+' non défini'}</div>`).join('')}</div>`;
    cont.appendChild(el);
  });
}

// ── Month view ────────────────────────────────────────────────
function changeMonth(dir){
  curM+=dir;if(curM>12){curM=1;curY++;}if(curM<1){curM=12;curY--;}
  renderMonthView();
}
function updatePearlBadge(childId){
  const c=childId?getChild(childId):null;
  const p=c?c.pearls||0:0;
  document.getElementById('month-pearl-badge').textContent=`🔮 ${p} perle${p!==1?'s':''}`;
}

function renderMonthView(){
  const childId = window.currentHeaderChildId || document.querySelector('#header-child-wrap select')?.value || '';
  window.currentHeaderChildId = childId;
  document.getElementById('month-label').textContent=MFR[curM-1]+' '+curY;
  const c=childId?getChild(childId):null;
  const pt=document.getElementById('print-title'),ps=document.getElementById('print-subtitle');
  if(pt)pt.textContent=c?c.name:'';if(ps)ps.textContent=MFR[curM-1]+' '+curY;
  updatePearlBadge(childId);
  updateShopButton();

  if(!childId){
    document.getElementById('weeks-container').innerHTML='<p style="padding:16px;color:var(--text-dim)">Sélectionnez un enfant.</p>';
    document.getElementById('summary-grid').innerHTML='';
    return;
  }

  const md=getMonthData(childId,curY,curM);
  ['obj1','obj2','obj3'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.value=md.objectives[i]||'';});

  const weeks=getWeeks(curY,curM);
  const cont=document.getElementById('weeks-container');cont.innerHTML='';

  weeks.forEach(w=>{
    const wk=String(w.wn);
    const wd=md.weeks[wk]||{behavior:'',obj1:'',obj2:'',obj3:'',best:'',worst:''};
    const betN=(md.betises||[]).filter(b=>{const bd=new Date(b.date);return bd>=w.start&&bd<=w.end;}).length;
    const pe=pearlsFor(wd.behavior);
    const objNames=md.objectives.map((o,i)=>o||`Obj. ${i+1}`);
    const qa=`'${childId}',${curY},${curM},'${wk}'`;

    const row=document.createElement('div');row.className='week-row';
    row.innerHTML=`
      <!-- Screen header -->
      <div class="week-meta no-print">
        <div class="week-left">
          <span class="week-num">Semaine ${wk}</span>
          <span class="week-dates">${fmtD(w.start)} → ${fmtD(w.end)}</span>
        </div>
        <div class="week-right">
          <span class="label-sm">Comportement</span>
          ${tlRadio(wd.behavior,'setBehavior',qa)}
          ${pe>0?`<span class="week-pearls">+${pe} 🔮</span>`:''}
          <span class="betises-pill" onclick="openBetises('${childId}',${curY},${curM},'${wk}','${w.start.toISOString()}','${w.end.toISOString()}')">${betN} bêtise${betN!==1?'s':''}</span>
        </div>
      </div>
      <!-- Print week header: left=num+days, right=comportement -->
      <div class="print-week-head">
        <div class="print-week-left">
          <span class="print-week-title">Semaine ${wk}</span>
          ${w.allDays.map(d=>`<span class="print-day-circle${d.inMonth?'':' print-day-out'}">${d.day}</span>`).join('')}
        </div>
        <div class="print-week-right">Comportement :&nbsp;${printCircle(wd.behavior)}</div>
      </div>
      <!-- Print objectives: avec ronds colorés -->
      <div class="print-objs-row">
        ${[0,1,2].map(n=>`<div class="print-obj-cell"><span class="print-circle" style="margin-right:6px"></span><span class="print-obj-name">${objNames[n]}</span></div>`).join('')}
      </div>
      <!-- Screen objectives row -->
      <div class="objs-row no-print">
        ${[0,1,2].map(n=>`<div class="obj-cell">
          <span class="label-sm">${objNames[n]}</span>
          ${tlRadio(wd['obj'+(n+1)],'setObjNote',`${qa},${n+1}`)}
        </div>`).join('')}
      </div>
      <!-- Best / worst -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px" class="week-inputs">
        <input class="field" placeholder="⭐ Meilleur moment..." value="${esc(wd.best)}"
          onchange="saveWeekField('${childId}',${curY},${curM},'${wk}','best',this.value)">
        <input class="field" placeholder="😬 Moment difficile..." value="${esc(wd.worst)}"
          onchange="saveWeekField('${childId}',${curY},${curM},'${wk}','worst',this.value)">
      </div>`;
    cont.appendChild(row);
  });

  renderSummary(childId,curY,curM,md,weeks);
}

// ── Setters ───────────────────────────────────────────────────
function setBehavior(childId,y,m,wk,val){
  const md=getMonthData(childId,y,m);
  if(!md.weeks[wk])md.weeks[wk]={behavior:'',obj1:'',obj2:'',obj3:'',best:'',worst:''};
  const old=md.weeks[wk].behavior||'';
  md.weeks[wk].behavior=val;
  saveMonthData(childId,y,m,md);

  const d=getData(),c=d.children.find(x=>x.id===childId);
  if(c){
    // Recalculate total pearls from scratch for this week (replace, not add)
    const oldGain=pearlsFor(old), newGain=pearlsFor(val), diff=newGain-oldGain;
    if(diff!==0){
      c.pearls=Math.max(0,(c.pearls||0)+diff);
      if(!c.history)c.history=[];
      const bets=(md.betises||[]).length;
      const desc=`Semaine S${wk} : comportement ${colLabel(val)}${bets>0?', '+bets+' bêtise'+(bets>1?'s':''):''}`;
      const key='S'+wk+'_'+y+'_'+m;
      const idx=c.history.findIndex(h=>h.week===key);
      const entry={date:fmtISO(new Date()),desc,amount:newGain,week:key};
      if(idx>=0) c.history[idx]=entry; else c.history.unshift(entry);
      if(c.history.length>200)c.history.pop();
      saveData(d);
    }
    updatePearlBadge(childId);
  }
  renderSummary(childId,y,m,getMonthData(childId,y,m),getWeeks(y,m));
}

function setObjNote(childId,y,m,wk,n,val){
  const md=getMonthData(childId,y,m);
  if(!md.weeks[wk])md.weeks[wk]={behavior:'',obj1:'',obj2:'',obj3:'',best:'',worst:''};
  md.weeks[wk]['obj'+n]=val;
  saveMonthData(childId,y,m,md);
  renderSummary(childId,y,m,getMonthData(childId,y,m),getWeeks(y,m));
}

function saveWeekField(childId,y,m,wk,field,val){
  const md=getMonthData(childId,y,m);
  if(!md.weeks[wk])md.weeks[wk]={behavior:'',obj1:'',obj2:'',obj3:'',best:'',worst:''};
  md.weeks[wk][field]=val;
  saveMonthData(childId,y,m,md);
}

const objectiveFocusValues = {};

function trackObjectiveFocus(n){
  const el = document.getElementById('obj'+n);
  if(el) objectiveFocusValues[n] = el.value.trim();
}

function saveObjectives(){
  const childId = window.currentHeaderChildId || document.querySelector('#header-child-wrap select')?.value;
  if(!childId) return;

  const md=getMonthData(childId,curY,curM);
  md.objectives=['obj1','obj2','obj3'].map(id=>document.getElementById(id).value.trim());
  saveMonthData(childId,curY,curM,md);
}

function handleObjectiveBlur(n){
  setTimeout(()=>commitObjectiveHistory(n), 30);
}

function commitObjectiveHistory(n){
  const childId = window.currentHeaderChildId || document.querySelector('#header-child-wrap select')?.value;
  if(!childId) return;

  const el = document.getElementById('obj'+n);
  if(!el) return;
  const newValue = el.value.trim();
  const oldValue = objectiveFocusValues[n] || '';
  if(newValue === oldValue) return;

  const md=getMonthData(childId,curY,curM);
  md.objectives = md.objectives || ['','',''];
  md.objectives[n-1] = newValue;
  saveMonthData(childId,curY,curM,md);
  addObjectiveHistory(childId, n, newValue);
}

function addObjectiveHistory(childId, n, value){
  const d=getData();
  const c=d.children.find(x=>x.id===childId);
  if(!c) return;
  if(!c.history) c.history=[];

  const monthLabel = `${MFR[curM-1]} ${curY}`;
  const desc = `Objectif ${n} ${monthLabel} : ${value || '(vide)'}`;
  const last=c.history[0];
  if(last && last.desc===desc && last.amount===0) return;

  c.history.unshift({date:fmtISO(new Date()),desc,amount:0});
  if(c.history.length>200) c.history.pop();
  saveData(d);
  if(document.getElementById('view-magasin')?.classList.contains('active')) renderShop();
}

// ── Summary ───────────────────────────────────────────────────
function renderSummary(childId,y,m,md,weeks){
  const el=document.getElementById('summary-grid');if(!el)return;
  let g=0,yel=0,r=0,tp=0;
  weeks.forEach(w=>{
    const wd=md.weeks[String(w.wn)]||{};
    if(wd.behavior==='green')g++;
    else if(wd.behavior==='yellow')yel++;
    else if(wd.behavior==='red')r++;
    tp+=pearlsFor(wd.behavior);
  });
  const tb=(md.betises||[]).length;
  el.innerHTML=`
    <div class="summary-card"><div class="summary-val c-green">${g}</div><div class="summary-label">Semaines vertes</div></div>
    <div class="summary-card"><div class="summary-val c-yellow">${yel}</div><div class="summary-label">Semaines jaunes</div></div>
    <div class="summary-card"><div class="summary-val c-red">${r}</div><div class="summary-label">Semaines rouges</div></div>
    <div class="summary-card"><div class="summary-val">${tb}</div><div class="summary-label">Bêtises ce mois</div></div>
    <div class="summary-card"><div class="summary-val c-cyan">${tp}</div><div class="summary-label">Perles gagnées</div></div>`;
}

// ── Bêtises ───────────────────────────────────────────────────
let _bm={};
function openBetises(childId,y,m,wk,startIso,endIso){
  _bm={childId,y:+y,m:+m,wk,start:new Date(startIso),end:new Date(endIso)};
  refreshBetiseList();
  document.getElementById('betise-date-input').value=fmtISO(new Date());
  document.getElementById('betise-comment').value='';
  document.getElementById('betise-modal-title').textContent=`Bêtises — Semaine ${wk}`;
  document.getElementById('betise-modal').classList.add('visible');
}
function refreshBetiseList(){
  const md=getMonthData(_bm.childId,_bm.y,_bm.m);
  const list=(md.betises||[]).filter(b=>{const bd=new Date(b.date);return bd>=_bm.start&&bd<=_bm.end;});
  document.getElementById('betise-list').innerHTML=list.length
    ?list.map(b=>`<div class="betise-item"><span class="betise-date">${b.date}</span><span class="betise-text">${b.comment}</span></div>`).join('')
    :'<p style="font-size:13px;color:var(--text-dim);margin-bottom:4px">Aucune bêtise cette semaine.</p>';
}
function closeBetiseModal(){document.getElementById('betise-modal').classList.remove('visible');}
function addBetise(){
  const date=document.getElementById('betise-date-input').value;
  const comment=document.getElementById('betise-comment').value.trim();
  if(!date||!comment)return;
  const md=getMonthData(_bm.childId,_bm.y,_bm.m);
  if(!md.betises)md.betises=[];
  md.betises.push({date,comment});
  md.betises.sort((a,b)=>a.date.localeCompare(b.date));
  saveMonthData(_bm.childId,_bm.y,_bm.m,md);
  document.getElementById('betise-comment').value='';
  refreshBetiseList();
  renderMonthView();
}
document.getElementById('betise-modal').addEventListener('click',e=>{if(e.target===document.getElementById('betise-modal'))closeBetiseModal();});

// ── Shop ──────────────────────────────────────────────────────
function renderShop(){
  const childId = window.currentHeaderChildId || document.querySelector('#header-child-wrap select')?.value || '';
  window.currentHeaderChildId = childId;
  const c=childId?getChild(childId):null;
  const p=c?c.pearls||0:0;
  // Le compteur de perles est maintenant dans l'en-tête
  document.getElementById('month-pearl-badge').textContent=`🔮 ${p} perle${p!==1?'s':''}`;
  updateShopButton();
  const d=getData();
  document.getElementById('shop-grid').innerHTML=d.shopItems.length
    ?d.shopItems.map((item,i)=>`<div class="shop-item">
        <div class="shop-item-name">${item.name}</div>
        <div class="shop-item-price">🔮 ${item.price} perle${item.price!==1?'s':''}</div>
        <button class="btn-buy" ${!c||p<item.price?'disabled':''} onclick="buyItem(${i})">Acheter</button>
      </div>`).join('')
    :'<p style="color:var(--text-dim)">Aucun article — ajoutez-en dans Admin.</p>';
  document.getElementById('history-list').innerHTML=c&&(c.history||[]).length
    ? c.history.map(e=>`<div class="history-item">
        <span class="history-item-date">${fmtFR(e.date)}</span>
        <span class="history-item-desc">${e.desc}</span>
        ${typeof e.amount==='number' && e.amount!==0 ? `<span class="${e.amount>0?'h-plus':'h-minus'}">${e.amount>0?'+':''}${e.amount} 🔮</span>` : ''}
      </div>`).join('')
    :'<p style="color:var(--text-dim);font-size:13px">Aucun historique.</p>';
}
function buyItem(idx){
  const childId = window.currentHeaderChildId || document.querySelector('#header-child-wrap select')?.value; if(!childId) return;
  const d=getData(),c=d.children.find(x=>x.id===childId),item=d.shopItems[idx];
  if(!c||!item||(c.pearls||0)<item.price){alert('Pas assez de perles !');return;}
  c.pearls-=item.price;
  if(!c.history)c.history=[];
  c.history.unshift({date:fmtISO(new Date()),desc:'Achat : '+item.name,amount:-item.price});
  (async()=>{ await saveData(d); renderShop(); })();
}
function addBonus(){
  const childId = window.currentHeaderChildId || document.querySelector('#header-child-wrap select')?.value;
  const qty=parseInt(document.getElementById('bonus-qty').value)||1;
  const reason=document.getElementById('bonus-reason').value.trim()||'Bonus';
  if(!childId||qty<1)return;
  const d=getData(),c=d.children.find(x=>x.id===childId);if(!c)return;
  c.pearls=(c.pearls||0)+qty;
  if(!c.history)c.history=[];
  c.history.unshift({date:fmtISO(new Date()),desc:'Bonus : '+reason,amount:qty});
  (async()=>{ await saveData(d); document.getElementById('bonus-reason').value=''; renderShop(); })();
}

// ── Admin ─────────────────────────────────────────────────────
function renderAdmin(){
  const d=getData();
  // Affiche la liste des enfants en Admin. Le compteur de perles est cliquable pour ajouter des perles.
  document.getElementById('admin-children-list').innerHTML=d.children.map((c,i)=>`
    <div class="admin-item">
      <span class="admin-item-name">${c.name}</span>
      <span class="admin-item-detail" style="cursor:pointer" onclick="promptAddPearls(${i})">🔮 <span id="child-pearls-${i}">${c.pearls||0}</span> perles</span>
      <button class="btn-reset-sm" onclick="resetChild(${i})">Remise à 0</button>
      <button class="btn-del-sm" onclick="removeChild(${i})">Supprimer</button>
    </div>`).join('')
    ||'<p style="color:var(--text-dim)">Aucun enfant.</p>';
  document.getElementById('admin-items-list').innerHTML=d.shopItems.map((item,i)=>`
    <div class="admin-item">
      <span class="admin-item-name">${item.name}</span>
      <span class="admin-item-detail">🔮 ${item.price}</span>
      <button class="btn-del-sm" onclick="removeShopItem(${i})">Supprimer</button>
    </div>`).join('')
    ||'<p style="color:var(--text-dim)">Aucun article.</p>';
}

function addChild(){
  const name=document.getElementById('new-child-name').value.trim();if(!name)return;
  const d=getData();d.children.push({id:'c'+Date.now(),name,pearls:0,history:[]});
  saveData(d);document.getElementById('new-child-name').value='';renderAdmin();
}
async function removeChild(i){
  if(!confirm('Supprimer cet enfant et toutes ses données ?'))return;
  const d=getData();
  const cid=d.children[i].id;
  // Remove all month data locally
  Object.keys(localStorage).filter(k=>k.startsWith(`comp_m_${cid}_`)).forEach(k=>localStorage.removeItem(k));
  d.children.splice(i,1);
  await saveData(d);
  // Remove remote month docs for this child
  if(window.FirestoreService && FirestoreService.initialized){
    try{
      const months = await FirestoreService.getCollection('comportement_months');
      const toDelete = months.filter(doc=>doc.id && doc.id.startsWith(`comp_m_${cid}_`));
      await Promise.all(toDelete.map(doc=>FirestoreService.deleteDoc('comportement_months', doc.id)));
    }catch(e){console.warn('Erreur suppression Firebase removeChild', e)}
  }
  renderAdmin();
}
async function resetChild(i){
  if(!confirm('Remettre à zéro les perles, l\'historique et les bêtises de cet enfant ?'))return;
  const d=getData();
  const c=d.children[i];
  c.pearls=0;c.history=[];
  // Clear all month data (betises + weeks) for this child
  Object.keys(localStorage).filter(k=>k.startsWith(`comp_m_${c.id}_`)).forEach(k=>{
    const md=LS.get(k);
    if(md){md.betises=[];md.weeks={};LS.set(k,md);} 
  });
  await saveData(d);
  // Update remote month docs for this child (clear weeks & betises)
  if(window.FirestoreService && FirestoreService.initialized){
    try{
      const months = await FirestoreService.getCollection('comportement_months');
      const childMonths = months.filter(doc=>doc.id && doc.id.startsWith(`comp_m_${c.id}_`));
      await Promise.all(childMonths.map(doc=>FirestoreService.setDoc('comportement_months', doc.id, {objectives:doc.objectives||['','',''],weeks:{},betises:[]})));
    }catch(e){console.warn('Erreur resetChild Firebase', e)}
  }
  renderAdmin();
}
async function addShopItem(){
  const name=document.getElementById('new-item-name').value.trim(),price=parseInt(document.getElementById('new-item-price').value)||1;
  if(!name)return;const d=getData();d.shopItems.push({name,price});
  await saveData(d);
  document.getElementById('new-item-name').value='';document.getElementById('new-item-price').value='';renderAdmin();
}
async function removeShopItem(i){const d=getData();d.shopItems.splice(i,1);await saveData(d);renderAdmin();}

/**
 * Ouvre une boîte de dialogue pour ajouter des perles à un enfant (Admin)
 * @param {number} idx Index de l'enfant dans le tableau
 */
async function promptAddPearls(idx){
  const d=getData();const c=d.children[idx];if(!c) return alert('Enfant introuvable');
  const qtyStr = prompt('Nombre de perles à ajouter (entier positif) :', '1');
  if(qtyStr===null) return; const qty = parseInt(qtyStr)||0; if(qty<=0) return alert('Quantité invalide');
  const reason = prompt('Raison (optionnel) :', 'Bonus admin') || 'Bonus admin';
  c.pearls = (c.pearls||0) + qty;
  if(!c.history) c.history = [];
  c.history.unshift({date:fmtISO(new Date()), desc: 'Bonus : ' + reason, amount: qty});
  await saveData(d);
  renderAdmin();
}

// ── Export / Import ───────────────────────────────────────────
function exportJSON(){
  const months={};Object.keys(localStorage).filter(k=>k.startsWith('comp_m_')).forEach(k=>{months[k]=LS.get(k);});
  const blob=new Blob([JSON.stringify({global:getData(),months},null,2)],{type:'application/json'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:'comportement_'+fmtISO(new Date())+'.json'});
  a.click();URL.revokeObjectURL(a.href);
}
function importJSON(e){
  const r=new FileReader();
  r.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(data.global)saveData(data.global);if(data.months)Object.entries(data.months).forEach(([k,v])=>LS.set(k,v));alert('Import réussi !');renderAdmin();}catch{alert('Fichier invalide.');}};
  r.readAsText(e.target.files[0]);
}
async function clearAll(){
  Object.keys(localStorage).filter(k=>k.startsWith('comp')).forEach(k=>localStorage.removeItem(k));
  if(window.FirestoreService && FirestoreService.initialized){
    try{
      const months = await FirestoreService.getCollection('comportement_months');
      await Promise.all(months.map(doc=>FirestoreService.deleteDoc('comportement_months', doc.id)));
      await FirestoreService.deleteDoc('comportement','global');
    }catch(e){console.warn('Erreur suppression Firebase clearAll', e)}
  }
  renderAdmin();
}
function printMonth(){window.print();}

// --- Firebase integration for comportement ---
async function loadRemoteComportement(){
  if(!window.FirestoreService) return;
  try{
    const globalDoc = await FirestoreService.getDoc('comportement','global');
    if(globalDoc) LS.set('comportement_data', globalDoc);
    const months = await FirestoreService.getCollection('comportement_months');
    months.forEach(doc=>{ if(doc && doc.id) LS.set(doc.id, doc); });
  }catch(e){ console.warn('Erreur lecture comportement Firebase :', e); }
}

async function initFirebaseForComportement(){
  if(!window.FirestoreService){ renderHome(); return; }
  try{
    if(window.firebaseConfig) FirestoreService.init(window.firebaseConfig);
    await FirestoreService.loadAdminPassword();
    await loadRemoteComportement();
  }catch(e){ console.warn('Init Firebase comportement:', e); }
  renderHome();
  // Initialiser le mois et mettre à jour l'affichage
  document.getElementById('month-label').textContent = MFR[curM-1] + ' ' + curY;
  updateShopButton();
}

// Démarre en essayant d'utiliser Firebase si disponible
initFirebaseForComportement();
</script>
