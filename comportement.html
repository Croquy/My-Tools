<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comportement - My Tools</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── Comportement-specific styles ── */
.nav-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.nav-tab{background:var(--surface);border:1px solid var(--border);color:var(--text-mid);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;padding:8px 18px;cursor:pointer;border-radius:30px;transition:all .2s}
.nav-tab.active{background:linear-gradient(135deg,var(--pink),var(--purple));border-color:transparent;color:white}
.nav-tab:hover:not(.active){border-color:var(--purple)}
.view{display:none}.view.active{display:block}

/* ── Enfant cards accueil ── */
.child-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.child-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all .2s}
.child-card:hover{border-color:var(--purple);transform:translateY(-2px)}
.child-card-name{font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.child-card-pearls{font-size:13px;color:var(--cyan);font-weight:700;margin-bottom:10px}
.child-card-goals{font-size:11px;color:var(--text-dim);line-height:1.6}
.child-card-goal-item{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:#50fa7b}.dot-yellow{background:#f1fa8c}.dot-red{background:#ff5555}.dot-gray{background:var(--text-dim)}

/* ── Monthly view ── */
.month-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.month-nav{display:flex;align-items:center;gap:8px}
.btn-month{background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:14px;width:32px;height:32px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s}
.btn-month:hover{border-color:var(--purple)}
.month-label{font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;color:var(--text);min-width:130px;text-align:center}
.month-child-name{font-family:'Quicksand',sans-serif;font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pearl-badge{background:var(--cyan-light);border:1px solid rgba(139,233,253,.3);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--cyan);font-weight:700}

/* ── Objectives ── */
.objectives-section{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px}
.section-title{font-family:'Quicksand',sans-serif;font-size:13px;font-weight:700;color:var(--pink);margin-bottom:12px;letter-spacing:.05em}
.objectives-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.obj-input-wrap{display:flex;flex-direction:column;gap:4px}
.obj-label{font-size:10px;color:var(--text-dim);font-weight:600}
.obj-input{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);font-family:'Nunito',sans-serif;font-size:12px;padding:7px 10px;border-radius:10px;outline:none;transition:border-color .15s;width:100%}
.obj-input:focus{border-color:var(--pink)}
.obj-input::placeholder{color:var(--text-dim)}

/* ── Weeks table ── */
.weeks-section{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px}
.week-row{border-bottom:1px solid var(--border);padding:12px 16px}
.week-row:last-child{border-bottom:none}
.week-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.week-label{font-family:'Quicksand',sans-serif;font-size:12px;font-weight:700;color:var(--purple);min-width:80px}
.week-dates{font-size:10px;color:var(--text-dim)}
.week-pearls-earned{font-size:11px;color:var(--cyan)}
.week-content{display:grid;grid-template-columns:auto 1fr 1fr 1fr auto;gap:8px;align-items:start}
.week-note-label{font-size:10px;color:var(--text-dim);font-weight:600;align-self:center}
.traffic-lights{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tl-btn{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s;opacity:.35}
.tl-btn.active{opacity:1;transform:scale(1.15)}
.tl-btn:hover{opacity:.8}
.tl-green{background:#50fa7b}.tl-yellow{background:#f1fa8c}.tl-red{background:#ff5555}
.week-inputs{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.week-small-input{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);font-family:'Nunito',sans-serif;font-size:12px;padding:6px 10px;border-radius:10px;outline:none;transition:border-color .15s;width:100%}
.week-small-input:focus{border-color:var(--cyan)}
.week-small-input::placeholder{color:var(--text-dim)}
.obj-lights-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;grid-column:1/-1}
.obj-light-cell{display:flex;flex-direction:column;gap:4px}
.obj-light-name{font-size:10px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.betises-count{background:var(--pink-light);border:1px solid rgba(255,121,198,.3);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--pink);cursor:pointer;font-weight:700;white-space:nowrap}
.betises-count:hover{background:rgba(255,121,198,.3)}

/* ── Bottom actions ── */
.month-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}

/* ── Admin ── */
.admin-section{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px}
.admin-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.admin-item{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:8px 12px}
.admin-item-name{flex:1;font-size:13px;color:var(--text)}
.admin-item-detail{font-size:11px;color:var(--text-dim)}
.admin-add-row{display:flex;gap:8px;flex-wrap:wrap}
.admin-input{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;padding:7px 12px;border-radius:20px;outline:none;transition:border-color .15s;flex:1;min-width:120px}
.admin-input:focus{border-color:var(--purple)}
.admin-input::placeholder{color:var(--text-dim)}
.btn-sm{background:linear-gradient(135deg,var(--pink),var(--purple));border:none;color:white;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:7px 14px;cursor:pointer;border-radius:20px;transition:all .2s;white-space:nowrap}
.btn-sm:hover{transform:scale(1.04)}
.btn-del-sm{background:transparent;border:1px solid rgba(255,80,80,.3);color:#ff5555;font-size:11px;padding:4px 8px;cursor:pointer;border-radius:10px;transition:all .15s}
.btn-del-sm:hover{background:rgba(255,80,80,.15)}

/* ── Shop ── */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:12px}
.shop-item{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;transition:all .2s}
.shop-item:hover{border-color:var(--cyan)}
.shop-item-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.shop-item-price{font-size:12px;color:var(--cyan);margin-bottom:8px}
.btn-buy{background:var(--cyan-light);border:1px solid rgba(139,233,253,.4);color:var(--cyan);font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;padding:5px 12px;cursor:pointer;border-radius:20px;transition:all .15s}
.btn-buy:hover{background:var(--cyan);color:var(--bg)}
.btn-buy:disabled{opacity:.35;cursor:not-allowed}
.history-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto}
.history-item{display:flex;align-items:center;gap:8px;font-size:11px;padding:5px 8px;background:rgba(255,255,255,.03);border-radius:8px}
.history-item-desc{flex:1;color:var(--text-mid)}
.history-item-amount{font-weight:700}
.history-item-amount.plus{color:var(--mint)}
.history-item-amount.minus{color:var(--pink)}
.history-item-date{color:var(--text-dim);font-size:10px}

/* ── Overlay ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:200}
.modal-overlay.visible{display:flex}
.modal-card{background:linear-gradient(135deg,#1a1235,#0f1a2e);border:1px solid rgba(255,121,198,.4);border-radius:24px;padding:24px;max-width:440px;width:90%;max-height:80vh;overflow-y:auto;animation:slideUp .3s ease}
.modal-title{font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:14px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.betise-item{display:flex;gap:8px;align-items:flex-start;background:rgba(255,121,198,.05);border:1px solid rgba(255,121,198,.2);border-radius:10px;padding:8px 10px;margin-bottom:6px}
.betise-date{font-size:10px;color:var(--pink);font-weight:700;white-space:nowrap}
.betise-text{font-size:12px;color:var(--text-mid);flex:1}
.bonus-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.bonus-input{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;padding:7px 12px;border-radius:20px;outline:none;flex:1;min-width:100px}
.bonus-input:focus{border-color:var(--mint)}
.bonus-qty{width:70px}

/* ── Print styles ── */
@media print{
  body{background:white;color:black;padding:0}
  body::before,body::after{display:none}
  .no-print{display:none!important}
  .print-only{display:block!important}
  .panel,.weeks-section,.objectives-section,.admin-section,.child-cards,.shop-grid{border:1px solid #ccc;background:white}
  .slot-input,.obj-input,.week-small-input{color:black;background:white}
  .tl-btn{border:2px solid #999}
  .tl-green.active{background:#4caf50}
  .tl-yellow.active{background:#ffeb3b}
  .tl-red.active{background:#f44336}
  .print-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .print-week{border:1px solid #ddd;padding:8px;page-break-inside:avoid}
  .print-title{font-size:20px;font-weight:700;margin-bottom:4px}
  .print-subtitle{font-size:13px;color:#666;margin-bottom:16px}
  .print-month-header{margin-bottom:16px}
  header,.nav-tabs,.month-actions,.btn-craque,.btn-resume,.btn-month{display:none!important}
  @page{margin:1.5cm}
}
.print-only{display:none}

/* ── Child selector in month view ── */
.child-select-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.styled-select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;padding:7px 14px;border-radius:20px;outline:none;cursor:pointer}
.styled-select:focus{border-color:var(--purple)}
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header no-print">
    <div class="header-info">
      <div class="title-row">
        <h1>Comportement</h1>
      </div>
      <div class="header-date">Suivi des enfants</div>
    </div>
    <div class="header-center"></div>
    <div class="header-right">
      <a href="index.html" style="color:var(--text-dim);font-size:12px;text-decoration:none;font-weight:600">← Accueil</a>
    </div>
  </div>

  <!-- Nav tabs -->
  <div class="nav-tabs no-print">
    <button class="nav-tab active" onclick="showView('accueil')">🏠 Accueil</button>
    <button class="nav-tab" onclick="showView('mensuel')">📅 Vue mensuelle</button>
    <button class="nav-tab" onclick="showView('magasin')">🛍 Magasin</button>
    <button class="nav-tab" onclick="showView('admin')">⚙️ Admin</button>

  <!-- ═══ VUE ACCUEIL ═══ -->

      <div class="month-nav">
        <button class="btn-month" onclick="changeMonth(-1)">‹</button>
        <div class="month-label" id="month-label"></div>
        <button class="btn-month" onclick="changeMonth(1)">›</button>
      </div>
      <span class="pearl-badge" id="month-pearl-badge">🔮 0 perles</span>
    </div>

    <!-- Print header -->
    <div class="print-only print-month-header">
      <div class="print-title" id="print-title"></div>

    </div>

    <!-- Objectives -->
    <div class="objectives-section">
      <div class="section-title">🎯 Objectifs du mois</div>
      <div class="objectives-grid">

          <label class="obj-label">Objectif 1</label>
          <input class="obj-input" id="obj1" placeholder="Ex: Ranger ma chambre" oninput="saveObjectives()">
        </div>
        <div class="obj-input-wrap">
          <label class="obj-label">Objectif 2</label>
          <input class="obj-input" id="obj2" placeholder="Ex: Faire mes devoirs seul" oninput="saveObjectives()">
        </div>
        <div class="obj-input-wrap">
          <label class="obj-label">Objectif 3</label>
          <input class="obj-input" id="obj3" placeholder="Ex: Être gentil avec..." oninput="saveObjectives()">
        </div>

    <!-- Weeks -->

        <input class="bonus-input" id="bonus-reason" placeholder="Raison (ex: aide à la maison)">
        <button class="btn-sm" onclick="addBonus()">+ Perles</button>

    </div>

    <div class="admin-section">
      <div class="section-title">🛍 Magasin</div>

    </div>

    <div class="admin-section">
      <div class="section-title">📜 Historique</div>

  <!-- ═══ VUE ADMIN ═══ -->
  <div class="view" id="view-admin">

    <div class="admin-section">

</div>

<!-- ═══ MODAL BÊTISES ═══ -->
<div class="modal-overlay" id="betise-modal">

    <div class="modal-title" id="betise-modal-title">Bêtises</div>
    <div id="betise-list"></div>
    <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;font-weight:600">AJOUTER UNE BÊTISE</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <input type="date" class="week-small-input" id="betise-date-input">
        <input class="week-small-input" id="betise-comment" placeholder="Description...">

    </div>
    <div class="modal-actions">
      <button class="btn-dismiss" onclick="closeBetiseModal()">Fermer</button>
      <button class="btn-sm" onclick="addBetise()">Ajouter</button>
    </div>

<div class="modal-overlay" id="betise-modal" onclick="if(event.target===this)closeBetiseModal()"></div>

<script>
// ═══════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════
const LS = {
  get:(k)=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
};

function getData(){
  return LS.get('comportement_data') || {
    children:[],
    shopItems:[],
  };
}
function saveData(d){LS.set('comportement_data',d);}

function getMonthData(childId,year,month){
  const key=`comp_m_${childId}_${year}_${month}`;
  return LS.get(key)||{objectives:['','',''],weeks:{},betises:[]};
}
function saveMonthData(childId,year,month,md){
  const key=`comp_m_${childId}_${year}_${month}`;
  LS.set(key,md);
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentView='accueil';
let currentYear=new Date().getFullYear();
let currentMonth=new Date().getMonth()+1;
let betiseModalWeekIdx=null; // null = free add

const MONTHS_FR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_FR=['dim','lun','mar','mer','jeu','ven','sam'];

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(el=>{
    if(el.textContent.includes({accueil:'Accueil',mensuel:'mensuelle',magasin:'Magasin',admin:'Admin'}[v]))
      el.classList.add('active');
  });
  currentView=v;
  if(v==='accueil')renderHome();
  if(v==='mensuel'){populateChildSelects();renderMonthView();}
  if(v==='magasin'){populateChildSelects();renderShop();}
  if(v==='admin')renderAdmin();
}

// ═══════════════════════════════════════════
// WEEK HELPERS
// ═══════════════════════════════════════════
function getWeeksOfMonth(year,month){
  // Returns array of {weekNum,start:Date,end:Date}
  const weeks=[];
  const firstDay=new Date(year,month-1,1);
  const lastDay=new Date(year,month,0);
  // Find monday of first week
  let d=new Date(firstDay);
  const dow=d.getDay();
  // go back to monday
  d.setDate(d.getDate()-(dow===0?6:dow-1));
  while(d<=lastDay){
    const mon=new Date(d);
    const sun=new Date(d);sun.setDate(sun.getDate()+6);
    // ISO week number
    const tmpD=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    const day=tmpD.getUTCDay()||7;tmpD.setUTCDate(tmpD.getUTCDate()+4-day);
    const y1=new Date(Date.UTC(tmpD.getUTCFullYear(),0,1));
    const wn=Math.ceil((((tmpD-y1)/86400000)+1)/7);
    weeks.push({weekNum:wn,start:mon,end:sun});
    d.setDate(d.getDate()+7);
  }
  return weeks;
}

function fmtDate(d){return d.getDate()+'/'+(d.getMonth()+1);}
function fmtDateFull(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// ═══════════════════════════════════════════
// PEARL LOGIC
// ═══════════════════════════════════════════
function getChildById(id){return getData().children.find(c=>c.id===id);}

function awardWeekPearls(childId,weekNum,note,oldNote){
  const d=getData();
  const c=d.children.find(x=>x.id===childId);
  if(!c){return;}
  const oldGain=oldNote==='green'?2:oldNote==='yellow'?1:0;
  const newGain=note==='green'?2:note==='yellow'?1:0;
  const diff=newGain-oldGain;
  if(diff===0)return;
  c.pearls=(c.pearls||0)+diff;
  if(c.pearls<0)c.pearls=0;
  if(!c.history)c.history=[];
  if(diff!==0){
    c.history.unshift({date:new Date().toISOString().slice(0,10),desc:`Semaine S${weekNum} (comportement)`,amount:diff});
    if(c.history.length>100)c.history.pop();
  }
  saveData(d);
}

// ═══════════════════════════════════════════
// HOME VIEW
// ═══════════════════════════════════════════
function renderHome(){
  const d=getData();
  const cont=document.getElementById('home-cards');
  const empty=document.getElementById('home-empty');
  cont.innerHTML='';
  if(!d.children.length){empty&&(empty.style.display='block');return;}
  empty&&(empty.style.display='none');
  d.children.forEach(c=>{
    // Find last month with data
    const now=new Date();
    let objs=['','',''];
    for(let i=0;i<3;i++){
      const y=now.getFullYear(),m=now.getMonth()+1-i;
      const yr=m<=0?y-1:y,mo=((m-1+12)%12)+1;
      const md=getMonthData(c.id,yr,mo);
      if(md.objectives.some(o=>o)){objs=md.objectives;break;}
    }
    const card=document.createElement('div');
    card.className='child-card';
    card.onclick=()=>{showView('mensuel');document.getElementById('month-child-select').value=c.id;renderMonthView();};
    card.innerHTML=`
      <div class="child-card-name">${c.name}</div>
      <div class="child-card-pearls">🔮 ${c.pearls||0} perle${(c.pearls||0)!==1?'s':''}</div>
      <div class="child-card-goals">
        ${objs.map((o,i)=>`<div class="child-card-goal-item"><span class="dot dot-gray"></span><span>${o||'Objectif '+(i+1)+' non défini'}</span></div>`).join('')}
      </div>
    `;
    cont.appendChild(card);
  });
}

// ═══════════════════════════════════════════
// MONTH VIEW
// ═══════════════════════════════════════════
function populateChildSelects(){
  const d=getData();
  ['month-child-select','shop-child-select'].forEach(id=>{
    const sel=document.getElementById(id);
    if(!sel)return;
    const cur=sel.value;
    sel.innerHTML='<option value="">— Choisir un enfant —</option>';
    d.children.forEach(c=>{
      const o=document.createElement('option');
      o.value=c.id;o.textContent=c.name;
      sel.appendChild(o);
    });
    if(cur)sel.value=cur;
    if(!sel.value&&d.children.length)sel.value=d.children[0].id;
  });
}

function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth>12){currentMonth=1;currentYear++;}
  if(currentMonth<1){currentMonth=12;currentYear--;}
  renderMonthView();
}

function renderMonthView(){
  const childId=document.getElementById('month-child-select')?.value;
  const label=document.getElementById('month-label');
  if(label)label.textContent=MONTHS_FR[currentMonth-1]+' '+currentYear;

  // Print header
  const child=childId?getChildById(childId):null;
  const pt=document.getElementById('print-title');
  const ps=document.getElementById('print-subtitle');
  if(pt)pt.textContent=child?child.name:'';
  if(ps)ps.textContent=MONTHS_FR[currentMonth-1]+' '+currentYear;

  const badge=document.getElementById('month-pearl-badge');
  if(badge)badge.textContent='🔮 '+(child?child.pearls||0:0)+' perle'+(((child?child.pearls||0:0))!==1?'s':'');

  if(!childId){
    document.getElementById('weeks-container').innerHTML='<p style="padding:16px;color:var(--text-dim);font-size:13px">Sélectionnez un enfant.</p>';
    return;
  }

  const md=getMonthData(childId,currentYear,currentMonth);
  // Objectives
  ['obj1','obj2','obj3'].forEach((id,i)=>{
    const el=document.getElementById(id);
    if(el)el.value=md.objectives[i]||'';
  });

  // Weeks
  const weeks=getWeeksOfMonth(currentYear,currentMonth);
  const cont=document.getElementById('weeks-container');
  cont.innerHTML='';

  weeks.forEach((w,wi)=>{
    const wk=String(w.weekNum);
    const wdata=md.weeks[wk]||{behavior:'',obj1:'',obj2:'',obj3:'',best:'',worst:''};
    const betisesCount=(md.betises||[]).filter(b=>{
      const bd=new Date(b.date);
      return bd>=w.start&&bd<=w.end;
    }).length;

    const row=document.createElement('div');
    row.className='week-row';

    const pearlsEarned=wdata.behavior==='green'?2:wdata.behavior==='yellow'?1:0;

    row.innerHTML=`
      <div class="week-header">
        <span class="week-label">Semaine ${w.weekNum}</span>
        <span class="week-dates">${fmtDate(w.start)} → ${fmtDate(w.end)}</span>
        ${pearlsEarned>0?`<span class="week-pearls-earned">+${pearlsEarned} 🔮</span>`:''}
        <span class="betises-count" onclick="openBetiseWeek(${wi})">${betisesCount} bêtise${betisesCount!==1?'s':''}</span>
      </div>
      <div class="week-content">
        <span class="week-note-label">Comportement</span>
        <div class="traffic-lights">
          <button class="tl-btn tl-green ${wdata.behavior==='green'?'active':''}" title="Vert" onclick="setBehavior('${childId}',${currentYear},${currentMonth},'${wk}','green',${wi})"></button>
          <button class="tl-btn tl-yellow ${wdata.behavior==='yellow'?'active':''}" title="Jaune" onclick="setBehavior('${childId}',${currentYear},${currentMonth},'${wk}','yellow',${wi})"></button>
          <button class="tl-btn tl-red ${wdata.behavior==='red'?'active':''}" title="Rouge" onclick="setBehavior('${childId}',${currentYear},${currentMonth},'${wk}','red',${wi})"></button>
        </div>
      </div>
      <div class="obj-lights-row" style="margin-top:8px">
        ${[1,2,3].map(n=>{
          const objName=md.objectives[n-1]||('Objectif '+n);
          const val=wdata['obj'+n]||'';
          return `<div class="obj-light-cell">
            <div class="obj-light-name" title="${objName}">${objName}</div>
            <div class="traffic-lights">
              <button class="tl-btn tl-green ${val==='green'?'active':''}" onclick="setObjNote('${childId}',${currentYear},${currentMonth},'${wk}',${n},'green')"></button>
              <button class="tl-btn tl-yellow ${val==='yellow'?'active':''}" onclick="setObjNote('${childId}',${currentYear},${currentMonth},'${wk}',${n},'yellow')"></button>
              <button class="tl-btn tl-red ${val==='red'?'active':''}" onclick="setObjNote('${childId}',${currentYear},${currentMonth},'${wk}',${n},'red')"></button>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div class="week-inputs" style="margin-top:8px">
        <input class="week-small-input" placeholder="⭐ Meilleur moment de la semaine..." value="${(wdata.best||'').replace(/"/g,'&quot;')}" onchange="saveWeekField('${childId}',${currentYear},${currentMonth},'${wk}','best',this.value)">
        <input class="week-small-input" placeholder="😬 Moment difficile..." value="${(wdata.worst||'').replace(/"/g,'&quot;')}" onchange="saveWeekField('${childId}',${currentYear},${currentMonth},'${wk}','worst',this.value)">
      </div>
    `;
    cont.appendChild(row);
  });
}

function saveObjectives(){
  const childId=document.getElementById('month-child-select')?.value;
  if(!childId)return;
  const md=getMonthData(childId,currentYear,currentMonth);
  md.objectives=[
    document.getElementById('obj1').value,
    document.getElementById('obj2').value,
    document.getElementById('obj3').value,
  ];
  saveMonthData(childId,currentYear,currentMonth,md);
  // Update week obj names without full re-render
  document.querySelectorAll('.obj-light-name').forEach((el,i)=>{
    const n=i%3;
    el.textContent=md.objectives[n]||('Objectif '+(n+1));
    el.title=el.textContent;
  });
}

function setBehavior(childId,year,month,wk,val,wi){
  const md=getMonthData(childId,year,month);
  if(!md.weeks[wk])md.weeks[wk]={behavior:'',obj1:'',obj2:'',obj3:'',best:'',worst:''};
  const old=md.weeks[wk].behavior||'';
  md.weeks[wk].behavior=val;
  saveMonthData(childId,year,month,md);
  awardWeekPearls(childId,wk,val,old);
  renderMonthView();
}

function setObjNote(childId,year,month,wk,n,val){
  const md=getMonthData(childId,year,month);
  if(!md.weeks[wk])md.weeks[wk]={behavior:'',obj1:'',obj2:'',obj3:'',best:'',worst:''};
  md.weeks[wk]['obj'+n]=val;
  saveMonthData(childId,year,month,md);
  renderMonthView();
}

function saveWeekField(childId,year,month,wk,field,val){
  const md=getMonthData(childId,year,month);
  if(!md.weeks[wk])md.weeks[wk]={behavior:'',obj1:'',obj2:'',obj3:'',best:'',worst:''};
  md.weeks[wk][field]=val;
  saveMonthData(childId,year,month,md);
}

// ═══════════════════════════════════════════
// BÊTISES MODAL
// ═══════════════════════════════════════════
let betiseChildId=null,betiseYear=null,betiseMonth=null,betiseWeekIdx=null;

function openAddBetise(){
  betiseChildId=document.getElementById('month-child-select')?.value;
  if(!betiseChildId)return;
  betiseYear=currentYear;betiseMonth=currentMonth;betiseWeekIdx=null;
  openBetiseModal('Ajouter une bêtise');
}

function openBetiseWeek(wi){
  betiseChildId=document.getElementById('month-child-select')?.value;
  if(!betiseChildId)return;
  betiseYear=currentYear;betiseMonth=currentMonth;betiseWeekIdx=wi;
  openBetiseModal('Bêtises');
}

function openBetiseModal(title){
  document.getElementById('betise-modal-title').textContent=title;
  const md=getMonthData(betiseChildId,betiseYear,betiseMonth);
  const list=document.getElementById('betise-list');
  let betises=md.betises||[];
  if(betiseWeekIdx!==null){
    const weeks=getWeeksOfMonth(betiseYear,betiseMonth);
    const w=weeks[betiseWeekIdx];
    betises=betises.filter(b=>{const bd=new Date(b.date);return bd>=w.start&&bd<=w.end;});
  }
  list.innerHTML=betises.length?betises.map(b=>`
    <div class="betise-item">
      <span class="betise-date">${b.date}</span>
      <span class="betise-text">${b.comment}</span>
    </div>`).join(''):'<p style="font-size:12px;color:var(--text-dim)">Aucune bêtise enregistrée.</p>';

  // default date
  const today=new Date();
  document.getElementById('betise-date-input').value=fmtDateFull(today);
  document.getElementById('betise-comment').value='';
  document.getElementById('betise-modal').classList.add('visible');
}

function closeBetiseModal(){document.getElementById('betise-modal').classList.remove('visible');}

function addBetise(){
  const date=document.getElementById('betise-date-input').value;
  const comment=document.getElementById('betise-comment').value.trim();
  if(!date||!comment)return;
  const md=getMonthData(betiseChildId,betiseYear,betiseMonth);
  if(!md.betises)md.betises=[];
  md.betises.push({date,comment});
  md.betises.sort((a,b)=>a.date.localeCompare(b.date));
  saveMonthData(betiseChildId,betiseYear,betiseMonth,md);
  openBetiseModal(document.getElementById('betise-modal-title').textContent);
  renderMonthView();
}

document.getElementById('betise-modal').addEventListener('click',function(e){
  if(e.target===this)closeBetiseModal();
});

// SHOP VIEW
// ═══════════════════════════════════════════
function renderShop(){
  const childId=document.getElementById('shop-child-select')?.value;
  const child=childId?getChildById(childId):null;
  const badge=document.getElementById('shop-pearl-badge');
  if(badge)badge.textContent='🔮 '+(child?child.pearls||0:0)+' perle'+(((child?child.pearls||0:0))!==1?'s':'');

  const d=getData();
  const grid=document.getElementById('shop-grid');
  if(grid){
    grid.innerHTML=d.shopItems.length?d.shopItems.map((item,i)=>`
      <div class="shop-item">
        <div class="shop-item-name">${item.name}</div>
        <div class="shop-item-price">🔮 ${item.price} perle${item.price!==1?'s':''}</div>
        <button class="btn-buy" ${!child||((child.pearls||0)<item.price)?'disabled':''} onclick="buyItem(${i})">Acheter</button>
      </div>`).join(''):'<p style="font-size:13px;color:var(--text-dim)">Aucun article. Ajoutez-en dans Admin.</p>';
  }

  const hist=document.getElementById('history-list');
  if(hist&&child){
    const h=(child.history||[]);
    hist.innerHTML=h.length?h.map(e=>`
      <div class="history-item">
        <span class="history-item-desc">${e.desc}</span>
        <span class="history-item-amount ${e.amount>0?'plus':'minus'}">${e.amount>0?'+':''}${e.amount} 🔮</span>
        <span class="history-item-date">${e.date}</span>
      </div>`).join(''):'<p style="font-size:12px;color:var(--text-dim)">Aucun historique.</p>';
  }
}

function buyItem(idx){
  const childId=document.getElementById('shop-child-select')?.value;
  if(!childId)return;
  const d=getData();
  const c=d.children.find(x=>x.id===childId);
  const item=d.shopItems[idx];
  if(!c||!item)return;
  if((c.pearls||0)<item.price){alert('Pas assez de perles !');return;}
  c.pearls-=item.price;
  if(!c.history)c.history=[];
  c.history.unshift({date:new Date().toISOString().slice(0,10),desc:'Achat : '+item.name,amount:-item.price});
  saveData(d);
  renderShop();
}

function addBonus(){
  const childId=document.getElementById('shop-child-select')?.value;
  const qty=parseInt(document.getElementById('bonus-qty').value)||1;
  const reason=document.getElementById('bonus-reason').value.trim()||'Bonus';
  if(!childId||qty<1)return;
  const d=getData();
  const c=d.children.find(x=>x.id===childId);
  if(!c)return;
  c.pearls=(c.pearls||0)+qty;
  if(!c.history)c.history=[];
  c.history.unshift({date:new Date().toISOString().slice(0,10),desc:'Bonus : '+reason,amount:qty});
  saveData(d);
  document.getElementById('bonus-reason').value='';
  renderShop();
}

// ═══════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════
function renderAdmin(){
  const d=getData();
  // Children
  const cl=document.getElementById('admin-children-list');
  cl.innerHTML=d.children.map((c,i)=>`
    <div class="admin-item">
      <span class="admin-item-name">${c.name}</span>
      <span class="admin-item-detail">🔮 ${c.pearls||0} perles</span>
      <button class="btn-del-sm" onclick="removeChild(${i})">Supprimer</button>
    </div>`).join('')||'<p style="font-size:12px;color:var(--text-dim)">Aucun enfant.</p>';

  // Items
  const il=document.getElementById('admin-items-list');
  il.innerHTML=d.shopItems.map((item,i)=>`
    <div class="admin-item">
      <span class="admin-item-name">${item.name}</span>
      <span class="admin-item-detail">🔮 ${item.price}</span>
      <button class="btn-del-sm" onclick="removeShopItem(${i})">Supprimer</button>
    </div>`).join('')||'<p style="font-size:12px;color:var(--text-dim)">Aucun article.</p>';
}

function addChild(){
  const name=document.getElementById('new-child-name').value.trim();
  if(!name)return;
  const d=getData();
  d.children.push({id:'c'+Date.now(),name,pearls:0,history:[]});
  saveData(d);
  document.getElementById('new-child-name').value='';
  renderAdmin();
}

function removeChild(i){
  if(!confirm('Supprimer cet enfant et toutes ses données ?'))return;
  const d=getData();
  d.children.splice(i,1);
  saveData(d);
  renderAdmin();
}

function addShopItem(){
  const name=document.getElementById('new-item-name').value.trim();
  const price=parseInt(document.getElementById('new-item-price').value)||1;
  if(!name)return;
  const d=getData();
  d.shopItems.push({name,price});
  saveData(d);
  document.getElementById('new-item-name').value='';
  document.getElementById('new-item-price').value='';
  renderAdmin();
}

function removeShopItem(i){
  const d=getData();
  d.shopItems.splice(i,1);
  saveData(d);
  renderAdmin();
}

// ═══════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════
function exportJSON(){
  const d=getData();
  // Gather all month data
  const months={};
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('comp_m_'));
  keys.forEach(k=>{months[k]=LS.get(k);});
  const blob=new Blob([JSON.stringify({global:d,months},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='comportement_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);
}

function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.global)saveData(data.global);
      if(data.months)Object.entries(data.months).forEach(([k,v])=>LS.set(k,v));
      alert('Import réussi !');
      renderAdmin();
    }catch{alert('Fichier invalide.');}
  };
  r.readAsText(file);
}

function clearAll(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('comp')||k==='comportement_data');
  keys.forEach(k=>localStorage.removeItem(k));
  renderAdmin();
}
